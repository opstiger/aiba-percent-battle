  const rw=Math.max(1,Math.round(w*scale)),rh=Math.max(1,Math.round(h*scale));
  if(!force&&renderer.domElement.width===rw&&renderer.domElement.height===rh)return;
  q.scale=scale;

function updateRenderQuality(dt){
  const q=RENDER_QUALITY;
  if(q.locked||G.state==="menu"||G.state==="diff")return;
  const fps=1/Math.max(dt,0.001);
  q.fps=q.fps*0.92+fps*0.08;

  if(!active)return;

  }else if(q.high>4.5&&q.scale<target-.01){

  }
}

function pixTex(w,h,draw,opt){
  const cv=document.createElement("canvas");cv.width=w;cv.height=h;
  draw(cv.getContext("2d"),w,h);
  const t=new THREE.CanvasTexture(cv);
  const smooth=opt&&opt.smooth;
  t.magFilter=smooth?THREE.LinearFilter:THREE.NearestFilter;
  t.minFilter=smooth?THREE.LinearFilter:THREE.NearestFilter;
  t.generateMipmaps=false;
  if(smooth&&renderer.capabilities&&renderer.capabilities.getMaxAnisotropy){

  }
  if(THREE.sRGBEncoding)t.encoding=THREE.sRGBEncoding;
  return t;
}
function realBallTex(base,dark){

    g.fillStyle=base;g.fillRect(0,0,96,96);
    g.globalAlpha=0.28;g.fillStyle=dark;

    g.globalAlpha=1;g.fillStyle="#1f130a";

    g.fillRect(23,0,3,96);            // 经线 1

    for(let x=0;x<96;x++){            // 两条倾斜大圆 → 侧弧沟槽
      const y1=48+20*Math.sin((x/96)*Math.PI*2);

}

    if(outdoor){

      }
    }else{

        const odd=(x+z)%2===0;
        g.fillStyle=odd?"#a4763f":"#8f6432";
        g.fillRect(x*PXM,z*PXM,PXM,PXM);
        g.fillStyle="rgba(0,0,0,.12)";

        g.fillStyle="rgba(255,255,255,.05)";g.fillRect(x*PXM,z*PXM,4,PXM);

    g.fillStyle=outdoor?"rgba(32,72,64,.58)":"rgba(30,55,110,.55)";
    g.fillRect(0,0,u(-7.9),D*PXM); g.fillRect(u(7.9),0,W*PXM,D*PXM);
    g.fillRect(0,0,W*PXM,v(COURT.nearBaseline-.32));
    g.fillRect(0,v(COURT.farBaseline+.32),W*PXM,D*PXM-v(COURT.farBaseline+.32));
    g.lineWidth=8;g.strokeStyle="#f2f2f2";
    // boundary
    g.strokeRect(u(-COURT.halfWidth),v(COURT.nearBaseline),COURT.width*PXM,COURT.length*PXM);
    // full-court center line and circle
    g.strokeStyle="rgba(242,242,242,.8)";g.lineWidth=7;g.lineCap="round";
    g.beginPath();g.moveTo(u(-COURT.halfWidth),v(COURT.midZ));g.lineTo(u(COURT.halfWidth),v(COURT.midZ));g.stroke();
    g.beginPath();g.arc(u(0),v(COURT.midZ),1.8*PXM,0,Math.PI*2);g.stroke();
    // key
    const nearFreeThrowZ=COURT.nearBaseline+5.79;
    const farFreeThrowZ=COURT.farBaseline-5.79;
    g.strokeRect(u(-2.45),v(COURT.nearBaseline),4.9*PXM,5.79*PXM);
    g.beginPath();g.arc(u(0),v(nearFreeThrowZ),1.8*PXM,0,Math.PI*2);g.stroke();
    // 3pt line (暗白色,完整弧线)
    g.strokeStyle="#d8dde2";g.lineWidth=10;g.lineCap="round";
    const arcR=7.24,cx=0,cz=HOOP.z;
    // 弧线与底线两侧直线相切:直线在 x=±6.71,延伸到弧线
    const sideX=6.71;
    // 求弧线在 x=±sideX 处的 z(取靠近shooter的解): z = cz + sqrt(r²-sideX²)
    const zJoin=cz+Math.sqrt(arcR*arcR-sideX*sideX);
    // 左右直线段:近端底线到 zJoin
    g.beginPath();g.moveTo(u(-sideX),v(COURT.nearBaseline));g.lineTo(u(-sideX),v(zJoin));g.stroke();
    g.beginPath();g.moveTo(u(sideX),v(COURT.nearBaseline));g.lineTo(u(sideX),v(zJoin));g.stroke();
    // 顶弧:用线段拼,从左切点扫到右切点(经过shooter侧最高点 z=cz+r)
    const aL=Math.atan2(zJoin-cz,-sideX), aR=Math.atan2(zJoin-cz,sideX);
    g.beginPath();
    const N=64;
    for(let i=0;i<=N;i++){
      const a=aL+(aR-aL)*(i/N);

      if(i===0)g.moveTo(u(px),v(pz));else g.lineTo(u(px),v(pz));
    }

    g.strokeStyle="rgba(216,221,226,.62)";g.lineWidth=7;g.lineCap="round";
    g.strokeRect(u(-2.45),v(farFreeThrowZ),4.9*PXM,5.79*PXM);
    g.beginPath();g.arc(u(0),v(farFreeThrowZ),1.8*PXM,0,Math.PI*2);g.stroke();
    const farCz=COURT.farHoopZ,farJoin=farCz-Math.sqrt(arcR*arcR-sideX*sideX);
    g.beginPath();g.moveTo(u(-sideX),v(COURT.farBaseline));g.lineTo(u(-sideX),v(farJoin));g.stroke();
    g.beginPath();g.moveTo(u(sideX),v(COURT.farBaseline));g.lineTo(u(sideX),v(farJoin));g.stroke();
    const faL=Math.atan2(farJoin-farCz,-sideX), faR=Math.atan2(farJoin-farCz,sideX);
    g.beginPath();
    for(let i=0;i<=N;i++){
      const a=faL+(faR-faL)*(i/N);
      const px=cx+Math.cos(a)*arcR, pz=farCz+Math.sin(a)*arcR;
      if(i===0)g.moveTo(u(px),v(pz));else g.lineTo(u(px),v(pz));
    }
    g.stroke();
    // center logo
    g.fillStyle=outdoor?"#176b66":"#1d428a";g.beginPath();g.arc(u(0),v(COURT.midZ),2.1*PXM,0,7);g.fill();
    g.fillStyle=outdoor?"#f4e7b0":"#ffd23f";g.font="bold 56px Orbitron, monospace";g.textAlign="center";
    g.fillText("aiBA",u(0),v(COURT.midZ-.15));
    g.font="bold 34px Orbitron, monospace";g.fillText("★ RACE 100 ★",u(0),v(COURT.midZ+.8));
    // ---- 投篮点位:统一风格的地面小标记,低饱和、融入木地板 ----
    function spotDecal(x,z,r,fill,line,lw,txt,txtCol,fs){

  },{smooth:true});
}

function disposeEnvironmentRoot(root){
  const geometries=new Set(),materials=new Set();
  root.traverse(o=>{
    if(o.geometry&&o.geometry.dispose)geometries.add(o.geometry);
    if(o.material){
      const mats=Array.isArray(o.material)?o.material:[o.material];
      mats.forEach(m=>{if(m)materials.add(m);});
    }
  });
  geometries.forEach(g=>g.dispose());
  materials.forEach(m=>{if(m.map&&m.map.dispose)m.map.dispose();if(m.dispose)m.dispose();});
  while(root.children.length)root.remove(root.children[0]);
  root.userData={};
}

function getEnvironmentProgress(){
  if(G.state==="boot"||G.state==="menu"||G.state==="diff"||G.state==="intro")return 0;
  if(G.mode==="battle")return clamp(Math.max(G.score||0,G.battleOppScore||0)/BATTLE_TARGET,0,1);
  if(G.mode==="rackrush"&&G.rush)return clamp((G.rush.level+(G.timer<=0?1:1-G.timer/Math.max(1,(RACK_RUSH_LEVELS[G.rush.level]||RACK_RUSH_LEVELS[0]).time)))/RACK_RUSH_LEVELS.length,0,1);
  if(G.mode==="contest")return clamp((G.score||0)/40,0,1);
  return 0;
}
function updateEnvironment(dt){
  const progress=getEnvironmentProgress();
  environmentRoot.userData.progress=progress;
  updateRain(dt);
  updateFlowerCourt(progress,dt);
  updateBeachSunset(progress,dt);
}

const rackBalls=[]; const deepBalls=[]; let halfCourtBall=null;
function buildRacks(){
  const standM=new THREE.MeshLambertMaterial({color:0x2255aa});
  RACKS.forEach((r,ri)=>{
    const dir=HOOP.clone().sub(r.p);dir.y=0;dir.normalize();
    const base=r.p.clone().addScaledVector(dir,-0.85);
    const stand=new THREE.Mesh(new THREE.BoxGeometry(1.5,0.55,0.5),standM);
    stand.position.set(base.x,0.45,base.z);
    stand.rotation.y=Math.atan2(dir.x,dir.z);scene.add(stand);
    const perp=V3(dir.z,0,-dir.x);
    rackBalls[ri]=[];
    for(let b=0;b<5;b++){
      const mat=b===4?matGold:matBall;
      const m=new THREE.Mesh(ballGeo,mat);
      const off=(b-2)*0.3;
      m.position.set(base.x+perp.x*off,0.86,base.z+perp.z*off);
      m.rotation.set(rnd(0,1),rnd(0,1),0);
      scene.add(m);rackBalls[ri].push(m);
    }
  });
  DEEPS.forEach((d,i)=>{
    const ped=new THREE.Mesh(new THREE.BoxGeometry(0.45,0.9,0.45),
      new THREE.MeshLambertMaterial({color:0x1f7a28}));
    const dir=HOOP.clone().sub(d.p);dir.y=0;dir.normalize();
    const base=d.p.clone().addScaledVector(dir,-0.8);
    ped.position.set(base.x,0.45,base.z);scene.add(ped);
    const m=new THREE.Mesh(ballGeo,matDeep);
    m.position.set(base.x,1.05,base.z);scene.add(m);
    deepBalls[i]=m;
  });
  const hdir=HOOP.clone().sub(HALFCOURT.p);hdir.y=0;hdir.normalize();
  const hbase=HALFCOURT.p.clone().addScaledVector(hdir,-0.8);
  const hped=new THREE.Mesh(new THREE.BoxGeometry(0.62,1.0,0.62),
    new THREE.MeshLambertMaterial({color:0x263b18}));
  hped.position.set(hbase.x,0.5,hbase.z);hped.visible=false;scene.add(hped);
  halfCourtBall=new THREE.Mesh(ballGeo,matDeep);
  halfCourtBall.position.set(hbase.x,1.16,hbase.z);halfCourtBall.visible=false;scene.add(halfCourtBall);
  halfCourtBall.ped=hped;
}

/* 自适应取景:用球员全身+篮筐/篮板包围点反推相机距离,不再为中场写死镜头 */
const _afCenter=new THREE.Vector3(),_afMin=new THREE.Vector3(),_afMax=new THREE.Vector3();
const _afBack=new THREE.Vector3(),_afForward=new THREE.Vector3(),_afRight=new THREE.Vector3(),_afUp=new THREE.Vector3();
const _afTmp=new THREE.Vector3(),_afPts=[];
function afAdd(x,y,z){_afPts.push(V3(x,y,z));}
function autoFrameCam(rig,pPos,pJump,faceDir,opts){
  opts=opts||{};
  _afPts.length=0;
  const dir=_afTmp.set(faceDir.x,0,faceDir.z);
  if(dir.lengthSq()<0.001)dir.set(0,0,-1);
  dir.normalize();
  const perp=V3(dir.z,0,-dir.x);
  // 固定取景侧:始终取球员朝向篮筐时的同一侧,篮筐稳定停在屏幕同一边,不再左右翻转
  const side=opts.side!=null?opts.side:1;
  const shoeY=Math.max(0,pJump);
  const headY=1.9+pJump;
  const bodyW=0.48,bodyD=0.34;
  // 球员全身包围盒:脚、肩、头都纳入,避免竖屏时人物被左右/上下切掉。
  [-1,1].forEach(a=>[-1,1].forEach(b=>{
    const x=pPos.x+perp.x*a*bodyW+dir.x*b*bodyD;
    const z=pPos.z+perp.z*a*bodyW+dir.z*b*bodyD;
    afAdd(x,shoeY,z);afAdd(x,1.18+pJump,z);afAdd(x,headY,z);
  }));
  // 篮筐 + 篮板的大致包围点。篮板比篮筐更宽更高,必须一起装进画面。
  [-1.12,1.12].forEach(x=>[2.62,3.88].forEach(y=>afAdd(HOOP.x+x,y,HOOP.z-0.48)));
  [-0.46,0.46].forEach(x=>[-0.18,0.18].forEach(z=>afAdd(HOOP.x+x,HOOP.y,HOOP.z+z)));
  _afMin.set(Infinity,Infinity,Infinity);_afMax.set(-Infinity,-Infinity,-Infinity);
  _afPts.forEach(p=>{_afMin.min(p);_afMax.max(p);});
  _afCenter.addVectors(_afMin,_afMax).multiplyScalar(0.5);
  _afCenter.y+=opts.lookLift||0.08;
  // 从球员侧后方斜看,但距离由视锥计算得出。转播视角略高、略侧。
  const sideK=opts.broadcast?0.72:0.52;
  const backK=opts.broadcast?0.58:0.74;
  const heightK=opts.broadcast?0.42:0.34;
  _afBack.set(-dir.x*backK+perp.x*side*sideK,heightK,-dir.z*backK+perp.z*side*sideK).normalize();
  _afForward.copy(_afBack).negate();
  _afRight.crossVectors(_afForward,V3(0,1,0)).normalize();
  _afUp.crossVectors(_afRight,_afForward).normalize();
  const vFov=camera.fov*Math.PI/180;
  const aspect=camera.aspect||(innerWidth/innerHeight)||1;
  const hFov=2*Math.atan(Math.tan(vFov/2)*aspect);
  const tanH=Math.tan(hFov/2),tanV=Math.tan(vFov/2);
  const marginX=opts.marginX||1.44,marginY=opts.marginY||1.34;
  let dist=0;
  _afPts.forEach(p=>{
    _afTmp.copy(p).sub(_afCenter);
    const x=_afTmp.dot(_afRight),y=_afTmp.dot(_afUp),z=_afTmp.dot(_afForward);
    dist=Math.max(dist,Math.abs(x)*marginX/tanH-z,Math.abs(y)*marginY/tanV-z);
  });
  dist=clamp(dist+0.85,opts.minDist||5.2,opts.maxDist||30);
  rig.pos.copy(_afCenter).addScaledVector(_afBack,dist);
  rig.look.copy(_afCenter);
}

/* shooting pose driven by charge phase: 下蹲→举球(屈肘)→起跳伸展→顶点出手=完美 */
let poseK=0,landT=0;
function ease01(t){
  t=clamp(t,0,1);
  return t*t*(3-2*t);
}
function shotCurves(ph){
  const loadIn=ease01(ph/0.32);
  const rise=ease01((ph-0.58)/0.28);
  return {
    dip:loadIn*(1-rise),
    lift:ease01((ph-0.28)/0.48),
    rise,
    jmp:ease01((ph-0.76)/0.22),
    over:Math.max(0,ph-1)
  };
}
function poseFootBottomY(hip,knee,ankle){
  const a1=hip,a2=hip+knee,a3=hip+knee+ankle;
  return 0.78
    -0.34*Math.cos(a1)
    -0.32*Math.cos(a2)
    -0.04*Math.cos(a3)
    -0.05*Math.sin(a3)
    -0.065*Math.abs(Math.cos(a3))
    -0.15*Math.abs(Math.sin(a3));
}
const POSE_STAND_FOOT_Y=poseFootBottomY(0,0,0);
function poseGuy(o,c,lk){
  const sh=o.arms[0],gd=o.arms[1]; // arms[0]=x-0.33=角色右手(面朝篮筐时屏幕右侧) 投篮 / arms[1]=左手 护球
  sh.rotation.x=-0.35-0.25*c.dip-1.55*c.lift-0.9*c.jmp;
  o.elbows[1].rotation.x=-(0.45+1.2*c.lift)*(1-c.jmp*0.92)-0.4*c.over;
  gd.rotation.x=-0.35-0.2*c.dip-1.1*c.lift-0.5*c.jmp+0.55*c.over;
  o.elbows[0].rotation.x=-(0.4+0.85*c.lift)*(1-c.jmp*0.6);
  sh.rotation.z=-0.12*c.lift;gd.rotation.z=0.18*c.lift;
  // Real-shot leg chain: knees load forward, calves fold back into a V, soles stay planted until takeoff.
  const load=c.dip*(1-c.jmp*0.86);
  const land=lk||0;
  const hipBase=-0.48*load-0.24*land+0.06*c.jmp;
  const kneeBase=Math.max(0,0.98*load+0.82*land-0.78*c.jmp);
  const hipLead=hipBase-0.03*load,hipTrail=hipBase+0.03*load;
  const kneeLead=kneeBase*0.96,kneeTrail=kneeBase*1.04;
  const ankleLead=-(hipLead+kneeLead)*0.98-0.18*c.jmp+0.04*land;
  const ankleTrail=-(hipTrail+kneeTrail)*0.98-0.18*c.jmp+0.04*land;
  o.legs[0].rotation.x=hipLead;
  o.legs[1].rotation.x=hipTrail;
  o.knees[0].rotation.x=kneeLead;
  o.knees[1].rotation.x=kneeTrail;
  o.ankles[0].rotation.x=ankleLead;
  o.ankles[1].rotation.x=ankleTrail;
  o.shoes[0].rotation.x=0;
  o.shoes[1].rotation.x=0;
  // 上身前倾:蓄力约10°(0.17rad),起跳回正并略后仰送球
  o.g.rotation.x=0.12*load - 0.06*c.over - 0.03*c.jmp + 0.08*land;
  const footY=(poseFootBottomY(hipLead,kneeLead,ankleLead)+poseFootBottomY(hipTrail,kneeTrail,ankleTrail))*0.5;
  return POSE_STAND_FOOT_Y-footY;
}
function poseBallPos(v,c){
  v.set(-0.13+0.04*c.jmp,
    0.82+0.23*(1-c.dip)+0.7*c.lift+0.52*c.jmp,
    0.34-0.05*c.lift-0.18*c.jmp);
  return v;
}
function updPose(dt){
  const s=curShot();
  const ideal=s?weatherAdjustedIdeal(s,false):IDEAL;
  poseK=G.charging?G.power/ideal:Math.max(0,poseK-dt*4.5);
  const c=shotCurves(poseK);
  // apex cue: tiny vibration + faint tick at the top of the jump
  if(G.charging&&!G.apexed&&poseK>=1){
    G.apexed=true;
    if(navigator.vibrate)navigator.vibrate(12);
    blip(960,0.03,"square",0.045);
  }
  if(landT>0)landT-=dt;
  const lk=landT>0?Math.sin((0.3-landT)/0.3*Math.PI):0;
  P.jump=Math.max(-0.06,c.jmp*0.55-c.over*0.55);
  P.eyeDip=-0.26*c.dip-0.09*lk;
  // first-person: right-hand shot pocket, ball rises past the face to overhead
  hands.position.x=-0.05*c.lift;
  hands.position.y=-0.5-0.2*c.dip+0.3*c.lift+0.42*c.jmp;
  hands.position.z=-0.62+0.12*c.dip-0.17*c.jmp;
  hands.rotation.x=-0.25*c.lift-0.85*c.jmp+c.over*1.1;
  hands.rotation.z=-0.07*c.lift;
  // avatar
  player.g.position.set(P.pos.x,0,P.pos.z);
  player.g.rotation.y=P.face;
  if(P.walking){
    P.walkT+=dt*9;
    const sw=Math.sin(P.walkT);
    player.g.rotation.x=0;
    player.legs[0].rotation.x=sw*0.7;player.legs[1].rotation.x=-sw*0.7;
    player.knees[0].rotation.x=Math.max(0,-sw*0.5+0.25);player.knees[1].rotation.x=Math.max(0,sw*0.5+0.25);
    player.ankles[0].rotation.x=-sw*0.25;player.ankles[1].rotation.x=sw*0.25;
    player.shoes[0].rotation.x=0;player.shoes[1].rotation.x=0;
    player.arms[0].rotation.x=-sw*0.45;player.arms[1].rotation.x=sw*0.45;
    player.elbows[0].rotation.x=-0.4;player.elbows[1].rotation.x=-0.4;
  }else{
    player.g.position.y=poseGuy(player,c,lk)+P.jump;
  }
  poseBallPos(pBall.position,c);
}

let passing=null;
function startPass(){
  const s=curShot();if(!s||G.buzzed)return;
  passer.g.rotation.y=faceTo(passer.g.position,P.pos);
  passerBall.visible=false;
  const from=V3(passer.g.position.x,1.25,passer.g.position.z);
  const catchP=eyePos();catchP.y-=0.3;
  const dur=G.mode==="rackrush"?clamp(.16+from.distanceTo(catchP)*.018,.22,.32):clamp(0.3+from.distanceTo(catchP)*0.045,0.4,0.75);
  const mesh=new THREE.Mesh(ballGeo,shotMat(s));
  mesh.position.copy(from);scene.add(mesh);
  passing={mesh,from,to:catchP,t:0,dur};
  passer.arms.forEach(a=>{a.rotation.x=-1.5;});

  tween(0.3,k=>{
    passer.arms.forEach(a=>{a.rotation.x=-1.5+k*1.15;});
    passer.elbows.forEach(e=>{e.rotation.x=-0.9+k*0.8;});
  });

  passing.t+=dt;const k=Math.min(1,passing.t/passing.dur);

/* ---------------- walking between racks ---------------- */
let walk=null;
function walkTo(shot,cb){
  const base=shotBase(shot);
  const from=P.pos.clone(),to=base.clone();
  const dur=clamp(from.distanceTo(to)/3.4,0.5,1.7);
  P.walking=true;G.moving=true;P.walkT=0;
  walk={from,to,t:0,dur,fMove:faceTo(from,to),f1:faceTo(to,HOOP),cb,step:0};
}
function updWalk(dt){
  if(!walk)return;
  walk.t+=dt;const k=Math.min(1,walk.t/walk.dur);
  P.pos.lerpVectors(walk.from,walk.to,k);
  const tgt=k<0.75?walk.fMove:walk.f1;
  let d=tgt-P.face;while(d>Math.PI)d-=2*Math.PI;while(d<-Math.PI)d+=2*Math.PI;
  P.face+=d*Math.min(1,dt*8);
  if(((walk.t*3.4)|0)!==walk.step){
    walk.step=(walk.t*3.4)|0;
    blipBus(playerBus||master,150,0.04,"sine",0.035,90);
    if(Math.random()<0.55)shoeSqueak(false);
  }
  if(k>=1){
    P.face=walk.f1;P.walking=false;G.moving=false;
    player.legs[0].rotation.x=0;player.legs[1].rotation.x=0;
    player.knees[0].rotation.x=0;player.knees[1].rotation.x=0;
    player.ankles[0].rotation.x=0;player.ankles[1].rotation.x=0;
    player.shoes[0].rotation.x=0;player.shoes[1].rotation.x=0;
    player.g.rotation.x=0;
    const cb=walk.cb;walk=null;if(cb)cb();
  }
}

/* ---------------- AI live show: 看对手真实出手 ---------------- */
function genAIRun(o){
  const p=aiProb(o.r),money=(seededRandom()*5)|0;
  const shots=[];let total=0;
  for(let rk=0;rk<5;rk++){
    for(let b=0;b<5;b++){
      const m=(rk===money)||b===4,v=m?2:1,make=seededRandom()<p;
      shots.push({rack:rk,deep:null,money:m,val:v,make});
      if(make)total+=v;
    }
    if(rk===1||rk===2){
      const mk=seededRandom()<p*0.82;
      shots.push({rack:null,deep:rk===1?0:1,money:false,val:3,make:mk});
      if(mk)total+=3;
    }
  }
  return {shots,total};
}
const show={on:false,o:null,guy:null,q:[],idx:0,t:0,score:0,total:0,cb:null,c:shotCurves(0)};
function startAIShow(o,cb){
  G.state="aishow";enterArenaAudio(0.86);
  const run=genAIRun(o);
  show.on=true;show.o=o;show.cb=cb;show.total=run.total;show.score=0;show.idx=0;show.t=0;
  show.guy=rivalFor(o);show.guy.active=true;benchVis();
  // 蒙太奇队列:每架可视化2球(含花球)+本架快进chip,深远球全部可视化
  const q=[];
  for(let rk=0;rk<5;rk++){
    const rackShots=run.shots.filter(s=>s.rack===rk);
    const moneyShot=rackShots[4];
    const otherIdx=(Math.random()*4)|0,other=rackShots[otherIdx];
    const vis=[other,moneyShot];
    const visPts=vis.reduce((a,s)=>a+(s.make?s.val:0),0);
    const rackPts=rackShots.reduce((a,s)=>a+(s.make?s.val:0),0);
    q.push({type:"move",rack:rk});
    vis.forEach(s=>q.push({type:"shot",s}));
    if(rackPts-visPts>0)q.push({type:"chip",pts:rackPts-visPts});
    run.shots.filter(s=>s.deep!=null&&((rk===1&&s.deep===0)||(rk===2&&s.deep===1))).forEach(s=>{
      q.push({type:"move",deep:s.deep});q.push({type:"shot",s});

function nextShowItem(){

function updShow(dt){
  if(!show.on||!show.cur)return;
  show.t+=dt;const it=show.cur,g=show.guy;

    g.ankles[0].rotation.x=-sw*0.22;g.ankles[1].rotation.x=sw*0.22;g.g.rotation.x=0;
    if(k>=1){g.legs[0].rotation.x=0;g.legs[1].rotation.x=0;g.knees[0].rotation.x=0;g.knees[1].rotation.x=0;g.ankles[0].rotation.x=0;g.ankles[1].rotation.x=0;nextShowItem();}
  }else if(it.type==="shot"){

    const y=poseGuy(g,c,0)+Math.max(0,c.jmp*0.55-c.over*0.55);
    g.g.position.set(g.pos.x,y,g.pos.z);
    poseBallPos(g.ball.position,c);
    if(ph>=1.03&&!it.fired){

}
function fireSilentBall(base,s){
  const dirH=HOOP.clone().sub(base);dirH.y=0;const dist=dirH.length();dirH.normalize();
  const p0=base.clone().addScaledVector(dirH,-0.1);p0.y=2.05;
  const perp=V3(dirH.z,0,-dirH.x);
  let depth,lat;
  if(s.make){depth=rnd(-0.03,0.03);lat=rnd(-0.04,0.04);}
  else{depth=0.27*(Math.random()<0.5?1:-1);lat=rnd(-0.14,0.14);}
  const T=HOOP.clone().addScaledVector(dirH,depth).addScaledVector(perp,lat);
  const tf=0.78+dist*0.062;
  const v0=V3((T.x-p0.x)/tf,(T.y-p0.y)/tf+4.9*tf,(T.z-p0.z)/tf);
  const mesh=new THREE.Mesh(ballGeo,s.deep!=null?matDeep:(s.money?matGold:matBall));
  mesh.position.copy(p0);scene.add(mesh);
  const blob=new THREE.Mesh(blobGeo,blobMat.clone());
  blob.rotation.x=-Math.PI/2;blob.position.set(p0.x,0.02,p0.z);scene.add(blob);
  balls.push({mesh,blob,p0:p0.clone(),v0,tf,t:0,phase:"fly",outcome:s.make?"swish":"rimout",
    vel:new THREE.Vector3(),val:s.val,money:s.money,deep:s.deep!=null,made:false,life:1.4,bounces:0,
    rec:[],timeLeft:0,hot:false,startPos:p0.clone(),silent:true});
}

function pregameBuildShots(opts){
  const shots=[],actors=PREGAME.actors;
  const wanted=opts.mode==="battle"?5.8:(opts.mode==="rackrush"?5.0:5.2);
  let t=0,i=0,lastAction="";
  while(t<wanted){
    const actor=actors[i%actors.length]||actors[0];
    let action;
    if(i===0)action=pregamePick(["shoot","stretch","chalk"]);
    else if(i===1&&actors.length>1)action=pregamePick(["finger","shoot","pump","dunk"]);
    else action=pregamePick(PREGAME_ACTIONS);
    if(action===lastAction)action=pregamePick(PREGAME_ACTIONS);
    if(action==="huddle"&&actors.length<2)action="pump";
    if((action==="dunk"||action==="hang")&&opts.mode==="contest"&&Math.random()<0.45)action="shoot";
    const dur=rnd(1.15,1.65),cam=pregamePick(PREGAME_CAMS);

  }

}

function pregameAnimate(actor,action,u,seg){

    const hang=action==="hang"?smoothRange(.18,.36,u)*(1-smoothRange(.86,1,u)):Math.sin(clamp(u,0,1)*Math.PI);

    guy.arms[0].rotation.z=-0.25-toss*0.45;guy.arms[1].rotation.z=0.25+toss*0.45;
    guy.elbows.forEach(e=>e.rotation.x=-1.35+toss*0.8);

  }else if(action==="finger"){
    guy.arms[0].rotation.x=-2.15;guy.arms[0].rotation.z=-0.55;guy.elbows[0].rotation.x=-0.55;
    guy.arms[1].rotation.x=-0.55;guy.elbows[1].rotation.x=-0.55;
    guy.g.position.y=Math.sin(u*Math.PI)*0.05;
  }else if(action==="huddle"){
    const pump=Math.abs(Math.sin(t*6));
    guy.arms.forEach(a=>a.rotation.x=-1.55-pump*0.55);guy.elbows.forEach(e=>e.rotation.x=-1.05);

    guy.arms[0].rotation.x=-2.25;guy.arms[0].rotation.z=-0.25+Math.sin(t*8)*0.38;guy.elbows[0].rotation.x=-0.35;

  }else{
    const pump=Math.abs(Math.sin(t*7));

function pregameUpdateCamera(seg,u,dt){
  const focus=pregameFocus(seg),actor=seg.actor,guy=actor.guy;
  const face=guy.g.rotation.y||faceTo(actor.base,HOOP);
  const f=V3(Math.sin(face),0,Math.cos(face)),side=V3(f.z,0,-f.x).multiplyScalar(seg.side||1);
  const dest=V3(),look=focus.clone();look.y+=seg.action==="dunk"||seg.action==="hang"?0.45:0.18;
  if(seg.cam==="orbit"){
    const a=seg.seed+u*1.35,r=2.65+Math.sin(u*Math.PI)*0.45;
    dest.set(focus.x+Math.sin(a)*r,1.35+u*0.55,focus.z+Math.cos(a)*r);
  }else if(seg.cam==="push"){
    dest.copy(focus).addScaledVector(f,3.7-u*1.55).addScaledVector(side,0.85).setY(1.05+u*0.82);
  }else if(seg.cam==="low"){
    dest.copy(focus).addScaledVector(f,2.35).addScaledVector(side,0.9+u*0.3).setY(0.62+u*0.28);
  }else if(seg.cam==="overhead"){
    dest.copy(focus).addScaledVector(f,1.35).addScaledVector(side,1.65).setY(4.35-u*0.5);
    look.y=1.05;
  }else if(seg.cam==="follow"){
    dest.copy(focus).addScaledVector(f,2.35+Math.sin(u*Math.PI)*0.55).addScaledVector(side,0.75).setY(1.45);
  }else if(seg.cam==="pan"){
    dest.copy(focus).addScaledVector(f,2.45).addScaledVector(side,-1.55+u*3.1).setY(1.28);
  }else if(seg.cam==="pull"){
    dest.copy(focus).addScaledVector(f,1.75+u*2.05).addScaledVector(side,0.75).setY(1.25+u*0.45);
  }else{
    dest.copy(focus).addScaledVector(f,2.15).addScaledVector(side,1.05).setY(1.22+Math.sin(u*Math.PI)*0.12);
  }
  if(PREGAME.t<0.08||seg._justStarted){rig.pos.copy(dest);rig.look.copy(look);seg._justStarted=false;return;}
  rig.pos.lerp(dest,Math.min(1,dt*5.8));

}

function checkBattleOvertake(prevMe,prevOpp){
  G.battleScoreEvents=(G.battleScoreEvents||0)+1;
  if(G.battleCut||G.battleOver)return;
  const meLeads=G.score>G.battleOppScore,oppLeads=G.battleOppScore>G.score;
  const fromTie=(meLeads&&prevMe===prevOpp)||(oppLeads&&prevOpp===prevMe);
  const byMe=meLeads&&prevMe<prevOpp?true:(oppLeads&&prevOpp<prevMe?false:null);
  const hint=()=>toast((meLeads?"你":"对手")+"取得领先 · "+G.score+" : "+G.battleOppScore,meLeads?"#7CFC6B":"#ffd23f");
  if(fromTie){hint();return;}
  if(byMe===null)return;
  const top=Math.max(G.score,G.battleOppScore),margin=Math.abs(G.score-G.battleOppScore);
  const elapsed=G.tNow-(G.battleLastCutAt==null?-1e9:G.battleLastCutAt);
  const scoreGap=G.battleScoreEvents-(G.battleLastCutEvent==null?-1e9:G.battleLastCutEvent);
  const cutCount=G.battleCutCount||0;
  const locked=G.tNow<(G.battleCutLockUntil||0);
  const reserveFinal=cutCount>=2&&top<90;
  if(top<CUTAWAY_MIN_SCORE||margin<3||elapsed<BATTLE_CUT_COOLDOWN||scoreGap<BATTLE_CUT_MIN_SCORE_EVENTS||cutCount>=BATTLE_CUT_MAX||locked||reserveFinal){hint();return;}
  G.battleCutCount=cutCount+1;G.battleLastCutAt=G.tNow;G.battleLastCutEvent=G.battleScoreEvents;
  const key=top>=BATTLE_TARGET-15||(byMe?G.score-prevMe:G.battleOppScore-prevOpp)>=10;
  battleCutaway(byMe,key);
}

function battleScoreCallout(prevMe,prevOpp){
  if(G.mode!=="battle"||G.battleOver)return;
  if(!G.battleCalls)G.battleCalls={};
  const me=Math.min(G.score,BATTLE_TARGET),op=Math.min(G.battleOppScore||0,BATTLE_TARGET);
  const prevMax=Math.max(prevMe||0,prevOpp||0),nowMax=Math.max(me,op);
  const marks=[20,50,80,90];
  for(const m of marks){
    if(!G.battleCalls[m]&&prevMax<m&&nowMax>=m){
      G.battleCalls[m]=true;
      G.battleCutLockUntil=G.tNow+4;
      if(m===90){
        triggerFinalRun(me,op);
        if(nowMax>=95&&!G.battleCalls.final5){
          G.battleCalls.final5=true;
          setTimeout(()=>{broadcastSting("danger");paSay("最后五分决胜,"+me+"比"+op+"。一球都不能松。",true);toast("最后5分! "+me+" : "+op,"#ffd23f");},2450);
        }
        return;
      }
      broadcastSting(m>=80?"danger":"score");
      const lead=me>op?"你暂时领先。":op>me?G.battleOpp.n+"暂时领先。":"双方打平。";
      const tension=m>=90?"九十分关口,下一球都可能改变比赛。":m>=80?"进入最后冲刺阶段。":m>=50?"比赛过半,节奏开始加速。":"第一段比分播报。";
      paSay(tension+"现在"+me+"比"+op+"。"+lead,true);
      toast("比分播报 "+me+" : "+op,"#9fd1ff");
      return;
    }
  }
  if(!G.battleCalls.final5&&prevMax<95&&nowMax>=95){
    G.battleCalls.final5=true;
    G.battleCutLockUntil=G.tNow+4;
    broadcastSting("danger");

let _confAcc=0;
function updConf(dt){
  if(!confPts.visible)return;
  _confAcc+=dt;if(_confAcc<1/20)return;
  const step=Math.min(.1,_confAcc);_confAcc=0;
  for(let i=0;i<confN;i++){
    confPos[i*3]+=confVel[i].x*step+Math.sin(G.tNow*3+i)*0.01;
    confPos[i*3+1]+=confVel[i].y*step;
    confPos[i*3+2]+=confVel[i].z*step;

  }

/* ---------------- tween helper ---------------- */
const tweens=[];
const ease=k=>k<0.5?2*k*k:1-Math.pow(-2*k+2,2)/2;
function tween(dur,fn,done){tweens.push({t:0,dur,fn,done});}
function updTweens(dt){
  for(let i=tweens.length-1;i>=0;i--){
    const w=tweens[i];w.t+=dt;
    const k=Math.min(1,w.t/w.dur);w.fn(ease(k));
    if(k>=1){tweens.splice(i,1);if(w.done)w.done();}
  }
}
function glideTo(p,l,dur,cb){
  const p0=rig.pos.clone(),l0=rig.look.clone(),pt=p.clone(),lt=l.clone();
  G.moving=true;G.glideCam=true;
  tween(dur,k=>{
    rig.pos.lerpVectors(p0,pt,k);
    rig.pos.y+=Math.sin(k*Math.PI)*0.35;
    rig.look.lerpVectors(l0,lt,k);
  },()=>{G.moving=false;G.glideCam=false;if(cb)cb();});
}
function shotEye(shot){
  const base=shotBase(shot);
  const dir=HOOP.clone().sub(base);dir.y=0;dir.normalize();
  return base.clone().addScaledVector(dir,-0.25).setY(EYE);
}

function curShot(){return G.mode==="battle"?battleShot():(G.mode==="rackrush"?rackRushShot():G.seq[G.shotIdx]);}
function shotBase(shot){
  if(!shot)return RACKS[2].p;
  if(shot.super)return HALFCOURT.p;
  if(shot.deep!=null)return DEEPS[shot.deep].p;
  if(shot.p)return shot.p;
  return RACKS[shot.rack].p;
}
function shotMat(shot){
  if(!shot)return matBall;
  return (shot.super||shot.deep!=null)?matDeep:(shot.money?matGold:matBall);
}
function shotIdeal(shot){
  if(shot&&shot.super)return IDEAL_HALF;
  return shot&&shot.deep!=null?IDEAL_DEEP:IDEAL;
}
function isSameShotSpot(a,b){
  if(!a||!b)return false;
  const pa=shotBase(a),pb=shotBase(b);
  return pa.distanceTo(pb)<0.05;
}
function buildSeq(money){
  const s=[];
  for(let r=0;r<5;r++){
    for(let b=0;b<5;b++){
      const m=(r===money)||b===4;
      s.push({rack:r,ball:b,val:m?2:1,money:m,deep:null});
    }
    if(r===1)s.push({deep:0,val:3,money:false,rack:null});
    if(r===2)s.push({deep:1,val:3,money:false,rack:null});
  }
  return s;
}

function releaseShot(power,shot){
  const isBattle=G.mode==="battle";
  const isRush=G.mode==="rackrush";
  const isDeep=shot.deep!=null||shot.super;
  const ideal=weatherAdjustedIdeal(shot,true);
  const zone=playerSweetZone();
  const err=power-ideal, a=Math.abs(err), r=Math.random();
  // lateral error = device tilt + hand noise
  const tl=tiltDeg()*DIFFS[G.diff].latK;
  const latErr=tl+rnd(-0.035,0.035);
  const al=Math.abs(latErr);
  let outcome;
  if(a<=zone*0.5)outcome="swish";
  else if(a<=zone)outcome=r<0.5?"rattle":(r<0.7?"rattleout":(err>0&&r<0.85?"bank":"rimout"));
  else if(a<=zone*1.8)outcome=r<0.15?"rattle":(r<0.4?"rattleout":(err>0&&r<0.55?"bank":"rimout"));
  else outcome="miss";
  // tilt drags the ball sideways and downgrades the result
  if(outcome!=="miss"){
    if(al>0.3)outcome="miss";
    else if(al>0.2&&outcome!=="rimout")outcome="rimout";
    else if(al>0.12&&outcome==="swish")outcome=r<0.5?"rattle":"rattleout";
    else if(al>0.12&&outcome==="bank")outcome="rattleout";
  }
  // hide rack ball in contest mode; battle mode has infinite balls at each spot.
  if(!isBattle&&!isRush){
    if(shot.deep!=null)deepBalls[shot.deep].visible=false;
    else{const m=rackBalls[shot.rack][shot.ball];if(m)m.visible=false;}
  }
  // spawn from the hands (any camera mode)
  const p0=new THREE.Vector3();ballWorldPos(p0);
  handBall.visible=false;pBall.visible=false;
  const dirH=HOOP.clone().sub(p0);dirH.y=0;const dist=dirH.length();dirH.normalize();
  const perp=V3(dirH.z,0,-dirH.x);
  let depth=0,lat=0;
  if(outcome==="swish"){depth=rnd(-0.03,0.03);lat=clamp(latErr*0.5,-0.06,0.06)+rnd(-0.02,0.02);}
  else if(outcome==="rattle"||outcome==="rattleout"){depth=0.17*Math.sign(err||1);lat=clamp(latErr,-0.12,0.12)+rnd(-0.05,0.05);}
  else if(outcome==="bank"){depth=0.55;lat=clamp(latErr*0.5,-0.1,0.1);}
  else if(outcome==="rimout"){depth=0.27*Math.sign(err||1);lat=clamp(latErr*1.2,-0.2,0.2)+rnd(-0.07,0.07);}
  else{depth=clamp(err*0.055,-1.5,1.5);if(Math.abs(depth)<0.5)depth=0.55*Math.sign(err||1);lat=clamp(latErr*2,-0.9,0.9)+rnd(-0.2,0.2);}
  let T;
  if(outcome==="bank")T=V3(clamp(lat*4,-0.55,0.55)+rnd(-0.08,0.08),3.45+rnd(0,0.25),-8.42);
  else T=HOOP.clone().addScaledVector(dirH,depth).addScaledVector(perp,lat);
  const tf=0.78+dist*0.062;
  const v0=V3((T.x-p0.x)/tf,(T.y-p0.y)/tf+4.9*tf,(T.z-p0.z)/tf);
  const mesh=new THREE.Mesh(ballGeo,shotMat(shot));
  mesh.position.copy(p0);scene.add(mesh);
  const blob=new THREE.Mesh(blobGeo,blobMat.clone());
  blob.rotation.x=-Math.PI/2;blob.position.set(p0.x,0.02,p0.z);scene.add(blob);
  const hot=G.streak>=3;
  const B={mesh,blob,p0:p0.clone(),v0,tf,t:0,phase:"fly",outcome,vel:new THREE.Vector3(),
    val:shot.val,baseVal:shot.baseVal||shot.val,bonus:shot.bonus||0,money:shot.money,deep:isDeep,super:!!shot.super,rush:isRush,made:false,life:3,bounces:0,
    rec:[],timeLeft:G.timer,hot,startPos:p0.clone(),shooterPos:P.pos.clone(),shooterFace:P.face};
  balls.push(B);
  G.lastErr=err;
  // stats
  if(!G.practice&&!isBattle&&!isRush){
    if(isDeep)G.stats.deepT++;
    if(shot.money)G.stats.moneyT++;
  }
  if(isBattle){
    if(shot.super)G.stats.deepT++;
    battleUseSpot(shot.spotIdx);
    G.shotIdx++;G.canShoot=false;
    setTimeout(()=>{
      if(G.state!=="battle"||G.battleOver)return;
      if(!battleAutoMoveIfNeeded())readyBall();
    },260);
    return;
  }
  if(isRush){
    const rush=G.rush;if(!rush)return;
    rush.attempts++;rush.levelAttempts++;rush.shotNo++;G.shotIdx++;G.canShoot=false;
    const cfg=RACK_RUSH_LEVELS[rush.level],expectedCharge=shotIdeal(shot)/Math.max(1,playerChargeRate());
    const speedFeed=G.diff==="easy"?1.16:(G.diff==="hard"?.96:1.06);
    const feed=isRackRushSpeed(rush)?speedFeed:cfg.feed;
    const delay=Math.max(60,(feed-expectedCharge-.27)*1000);
    setTimeout(()=>{if(G.state==="rackrush"&&G.running&&!G.buzzed)readyBall();},delay);
    return;
  }
  // hero moment: last ball / buzzer beater / tiebreak
  const isLast=G.shotIdx===G.seq.length-1;
  if(!G.practice&&(isLast||G.state==="tiebreak"||(G.state==="round"&&G.timer<=3)))startHero(B);
  // advance
  G.shotIdx++;G.canShoot=false;
  const nxt=curShot();
  if(nxt){
    const samePos=isSameShotSpot(nxt,shot);
    setTimeout(()=>{
      if(G.state!=="round"&&G.state!=="tiebreak")return;
      if(samePos){readyBall();}
      else{walkTo(nxt,()=>readyBall());}
    },samePos?260:200);
  }
}

function updBalls(dt){
  for(let i=balls.length-1;i>=0;i--){
    const b=balls[i];b.t+=dt;
    if(b.phase==="fly"){
      const t=Math.min(b.t,b.tf);
      b.mesh.position.set(b.p0.x+b.v0.x*t,b.p0.y+b.v0.y*t-4.9*t*t,b.p0.z+b.v0.z*t);
      b.mesh.rotation.x-=dt*9;b.mesh.rotation.z+=dt*2;
      if(b.t>=b.tf){
        const vy=b.v0.y-9.8*b.tf;
        if(b.outcome==="swish"){
          if(b.opp){
            oppScore(b);b.made=true;
          }else if(b.silent){
            netPulse=1;sSwish();applause(0.3,1.2);if(Math.random()<0.22)boo(1.2);G.cheer=Math.min(1,G.cheer+0.4);
            show.score+=b.val;$("showScore").textContent=show.score;
            popScore("+"+b.val,b.deep?"#54e05a":(b.money?"#ffd23f":"#7CFC6B"));
            b.made=true;
          }else madeBall(b);
          b.phase="fall";
          b.vel.set(b.v0.x*0.12,vy,b.v0.z*0.12);
          b.mesh.position.set(HOOP.x+rnd(-.04,.04),HOOP.y-0.05,HOOP.z+rnd(-.04,.04));
        }else if(b.outcome==="bank"){
          sBoard();b.phase="bankdrop";b.bt=0;
          b.bFrom=b.mesh.position.clone();
        }else if(b.outcome==="rattle"||b.outcome==="rattleout"){
          sClank();b.phase="rattle";b.rt=0;b.rin=b.outcome==="rattle";
          b.ra=Math.atan2(b.mesh.position.z-HOOP.z,b.mesh.position.x-HOOP.x);
          b.rdir=Math.random()<.5?1:-1;
        }else if(b.outcome==="rimout"){
          sClank();if(!b.silent)missBall();b.phase="free";
          const d=V3(b.mesh.position.x-HOOP.x,0,b.mesh.position.z-HOOP.z).normalize();
          b.vel.set(d.x*rnd(1.2,2.2)+rnd(-.6,.6),rnd(2.4,3.6),d.z*rnd(1.2,2.2)+rnd(-.6,.6));
        }else{
          if(!b.silent)missBall();b.phase="free";
          b.vel.set(b.v0.x,vy,b.v0.z);
        }
      }
    }else if(b.phase==="rattle"){
      b.rt+=dt;const k=Math.min(1,b.rt/0.55);
      const sink=b.rin?0.45*k*k:0.18*k;
      const ang=b.ra+b.rt*9*b.rdir,rad=b.rin?0.2*(1-k):0.2;
      b.mesh.position.set(HOOP.x+Math.cos(ang)*rad,HOOP.y+0.08-sink,HOOP.z+Math.sin(ang)*rad);
      b.mesh.rotation.y+=dt*8;
      if(k>=1){
        if(b.rin){madeBall(b);b.phase="fall";b.vel.set(0,-1.6,0);}
        else{
          sClank();missBall();toast("😱 涮筐而出!","#ff8d7a");b.phase="free";
          const d=V3(Math.cos(b.ra+b.rt*9*b.rdir),0,Math.sin(b.ra+b.rt*9*b.rdir)).normalize();
          b.vel.set(d.x*rnd(1.4,2.4),rnd(2.0,3.0),d.z*rnd(1.4,2.4));
        }
      }
    }else if(b.phase==="bankdrop"){
      b.bt+=dt;const k=Math.min(1,b.bt/0.38);
      b.mesh.position.set(
        b.bFrom.x+(HOOP.x-b.bFrom.x)*k,
        b.bFrom.y+(HOOP.y-0.05-b.bFrom.y)*(k*k),
        b.bFrom.z+(HOOP.z-b.bFrom.z)*k);
      b.mesh.rotation.x+=dt*6;
      if(k>=1){madeBall(b);toast("🔨 打板入网!","#ffd23f");b.phase="fall";b.vel.set(0,-1.8,0);}
    }else{ // fall / free
      b.vel.y-=9.8*dt;
      b.mesh.position.addScaledVector(b.vel,dt);
      b.mesh.rotation.x-=b.vel.z*dt*3;b.mesh.rotation.z+=b.vel.x*dt*3;
      const p=b.mesh.position;
      // backboard
      if(b.phase==="free"&&b.vel.z<0&&p.z<-8.5&&p.z>-8.78&&Math.abs(p.x)<0.98&&p.y>2.9&&p.y<4.1){
        p.z=-8.5;b.vel.z*=-0.45;sBoard();
      }
      // floor
      if(p.y<0.16&&b.vel.y<0){
        p.y=0.16;b.vel.y*=-0.42;b.vel.x*=0.72;b.vel.z*=0.72;b.bounces++;
        if(Math.abs(b.vel.y)>0.6)sBounce();
      }
      b.life-=dt;
      if(b.life<=0||(b.bounces>3&&Math.abs(b.vel.y)<0.4)){
        scene.remove(b.mesh);scene.remove(b.blob);
        if(!b.silent)G.shots.push(b);
        balls.splice(i,1);continue;
      }
    }
    if(b.hot&&b.phase==="fly")emitFire(b.mesh.position);
    b.blob.position.set(b.mesh.position.x,0.02,b.mesh.position.z);
    const s=clamp(1.4-b.mesh.position.y*0.12,0.3,1.4);
    b.blob.scale.set(s,s,1);
    if(b.rec.length<240)b.rec.push([b.t,b.mesh.position.x,b.mesh.position.y,b.mesh.position.z]);
  }
}

async function preloadBootAsset(asset,total,state){
  let ok=true;
  try{
    const ctrl=typeof AbortController!=="undefined"?new AbortController():null;
    const timer=ctrl?setTimeout(()=>ctrl.abort(),12000):null;
    const res=await fetch(asset.url,{cache:"force-cache",signal:ctrl?ctrl.signal:undefined});
    if(timer)clearTimeout(timer);
    if(!res.ok)throw new Error("HTTP "+res.status);
    await res.arrayBuffer();
  }catch(e){ok=false;BOOT_FAILED++;}
  state.done+=asset.weight;state.finished++;
  setBootProgress(state.done,total,state.finished,state.count);
  return ok;
}

function stopCoverVideo(){
  clearTimeout(coverVideoTimer);coverVideoTimer=null;
  const v=document.querySelector(".coverVideo");
  if(v){try{v.classList.remove("ready");v.pause();v.removeAttribute("src");v.load();}catch(e){}}
}
function startCoverVideo(){
  const v=document.querySelector(".coverVideo");
  if(!v||!v.dataset.src)return;
  const conn=navigator.connection||navigator.mozConnection||navigator.webkitConnection;
  if(matchMedia("(prefers-reduced-motion: reduce)").matches||(conn&&(conn.saveData||/^(slow-)?2g$/.test(conn.effectiveType||""))))return;
  let failed=false;
  const fallback=()=>{
    failed=true;clearTimeout(coverVideoTimer);coverVideoTimer=null;
    try{v.classList.remove("ready");v.pause();v.removeAttribute("src");v.load();}catch(e){}
  };
  const reveal=()=>{
    if(failed)return;clearTimeout(coverVideoTimer);coverVideoTimer=null;
    v.classList.add("ready");
  };
  v.addEventListener("playing",reveal,{once:true});
  v.addEventListener("error",fallback,{once:true});
  v.src=v.dataset.src;v.load();
  try{const p=v.play();if(p&&p.catch)p.catch(fallback);}catch(e){fallback();return;}
  coverVideoTimer=setTimeout(()=>{if(v.readyState<2)fallback();},3500);
}
function scheduleCoverVideo(){
  if(BOOT_GATE_ACTIVE)return;
  coverVideoTimer=setTimeout(()=>{
    coverVideoTimer=null;
    if("requestIdleCallback" in window)requestIdleCallback(startCoverVideo,{timeout:1600});
    else startCoverVideo();
  },900);
}

function updateRackRush(dt){
  const rush=G.rush;if(!rush||G.state!=="rackrush")return;
  if(isRackRushSpeed(rush)){
    if(G.running){
      rush.elapsed+=dt;G.timer=rush.elapsed;rush.uiAcc+=dt;
      if(rush.uiAcc>=.1){rush.uiAcc=0;updateRackRushHUD();}
    }
    return;
  }
  if(G.running){
    rush.elapsed+=dt;G.timer=Math.max(0,G.timer-dt);rush.uiAcc+=dt;
    if(!rush.finalTen&&G.timer<=10){
      rush.finalTen=true;broadcastSting("danger");crowdSwell(.35,3);toast("FINAL 10 · 命中额外 +1","#ff5d4d");
      paSay("最后十秒,每球加一分!",true);
    }
    if(G.timer<=5&&G.timer>0&&G.tNow-lowBeep>1){lowBeep=G.tNow;sBeep();}
    if(rush.uiAcc>=.1){rush.uiAcc=0;updateRackRushHUD();}
    if(G.timer<=0&&!G.buzzed){
      G.buzzed=true;G.running=false;sBuzz();paSay("时间到!",true);
      if(G.charging)doRelease();G.canShoot=false;G.charging=false;handBall.visible=false;pBall.visible=false;
      toast("时间到 · 等待最后一球","#ff8d7a");
    }
  }
  if(G.buzzed&&!rush.levelEnding&&!G.charging&&!passing&&!balls.some(b=>b.rush))finishRackRushLevel();
}
function finishRackRushLevel(){
  const rush=G.rush;if(!rush||rush.levelEnding)return;
  if(isRackRushSpeed(rush)){finishRackRushSpeed();return;}
  rush.levelEnding=true;G.running=false;G.canShoot=false;G.state="rushbetween";$("vsBanner").style.display="none";

function startClip(){
  const h=G.highlights[rep.idx];
  rep.clip=h;rep.t=0;rep.scoredFx=false;
  rep.ghost.visible=true;rep.gBlob.visible=true;
  rep.ghost.material=h.deep?matDeep:(h.money?matGold:matBall);
  rep.end=Math.min(h.rec[h.rec.length-1][0],h.tf+0.4);
  // random broadcast cameras — all positioned in front of the backboard (z > -8) so nothing blocks the view
  const s=h.shooterPos||V3(h.startPos.x,0,h.startPos.z);
  const release=h.p0||h.startPos;
  const dir=HOOP.clone().sub(s);dir.y=0;dir.normalize();
  const perp=V3(dir.z,0,-dir.x);
  const mid=s.clone().lerp(HOOP,0.45);
  const side=Math.random()<0.5?1:-1;
  const photoPos=s.clone().addScaledVector(dir,-2.55).addScaledVector(perp,side*1.65).setY(1.85);
  const photoLook=s.clone().addScaledVector(dir,0.22).setY(1.42).lerp(release.clone(),0.52);
  rep.photoCam={p:photoPos,look:photoLook,n:"出手合影"};
  let p1=mid.clone().addScaledVector(perp,7.5).setY(2.6);
  if(Math.abs(p1.x)>13)p1=mid.clone().addScaledVector(perp,-7.5).setY(2.6);
  const A=[
    {p:p1,n:"侧翼跟拍"},
    {p:s.clone().addScaledVector(dir,-3.2).add(V3(side*1.6,0,0)).setY(3.4),n:"高位跟拍"},
    {p:mid.clone().addScaledVector(perp,4.5*Math.sign(p1.x-mid.x||1)).setY(0.7),n:"地板低机位"}];
  const B=[
    {p:V3(HOOP.x+side*2.1,3.7,HOOP.z+2.7),n:"篮筐特写"},
    {p:V3(side*6.3,2.1,-7.0),n:"底线机位"},
    {p:V3(HOOP.x-side*1.6,4.6,HOOP.z+3.4),n:"高空吊臂"}];
  rep.camA=A[(Math.random()*A.length)|0];
  rep.camB=B[(Math.random()*B.length)|0];
  toast(h.deep?"⚡ 深远三分回放":(h.timeLeft<3?"⏱ 压哨球回放":"💰 关键球回放"),"#ffd23f");
}
function updReplay(dt){
  const h=rep.clip;if(!h)return;
  rep.t+=dt*0.42; // slow-mo
  const photo=rep.t<REPLAY_PHOTO_DUR;
  const t=Math.min(Math.max(0,rep.t-REPLAY_PHOTO_DUR),rep.end);
  // 同步角色姿势:按回放时间映射投篮相位
  if(player.g.visible){
    const ph=photo?0.98:Math.min(1.08,0.92+t/Math.max(0.01,h.tf)*0.18);
    const c=shotCurves(ph);
    const y=poseGuy(player,c,0)+Math.max(0,c.jmp*0.55-c.over*0.55);
    const s=h.shooterPos||V3(h.startPos.x,0,h.startPos.z);
    player.g.position.set(s.x,y,s.z);
    player.g.rotation.y=h.shooterFace!=null?h.shooterFace:faceTo(s,HOOP);
    passer.g.visible=false; // 回放期间隐藏传球者避免挡镜头
  }
  // interp position
  let j=1;while(j<h.rec.length&&h.rec[j][0]<t)j++;
  const a=h.rec[Math.max(0,j-1)],b2=h.rec[Math.min(j,h.rec.length-1)];
  const k=b2[0]>a[0]?(t-a[0])/(b2[0]-a[0]):0;
  if(h.p0&&(photo||t<=h.rec[0][0]))rep.ghost.position.copy(h.p0);
  else rep.ghost.position.set(a[1]+(b2[1]-a[1])*k,a[2]+(b2[2]-a[2])*k,a[3]+(b2[3]-a[3])*k);
  rep.ghost.rotation.x-=dt*4;
  rep.gBlob.position.set(rep.ghost.position.x,0.02,rep.ghost.position.z);
  const cut=h.tf*0.6;
  if(photo){
    rig.pos.copy(rep.photoCam.p);rig.pos.y+=Math.sin(rep.t*8)*0.03;
    rig.look.copy(rep.photoCam.look);
    $("repCam").textContent="📺 机位 0 · "+rep.photoCam.n;
  }else if(t<cut){
    rig.pos.copy(rep.camA.p);rig.pos.x+=Math.sin(rep.t*0.5)*0.5;rig.pos.y+=Math.sin(rep.t*0.7)*0.15;
    $("repCam").textContent="📺 机位 1 · "+rep.camA.n;
  }else{
    rig.pos.copy(rep.camB.p);rig.pos.y+=Math.sin(rep.t*0.6)*0.12;
    $("repCam").textContent="📺 机位 2 · "+rep.camB.n;
  }
  if(!photo)rig.look.copy(rep.ghost.position);
  if(!rep.scoredFx&&t>=h.tf*0.98){
    rep.scoredFx=true;netPulse=1;sSwish();cheerSound(true);G.cheer=1;
  }
  if(rep.t>REPLAY_PHOTO_DUR+rep.end+0.35){
    rep.idx++;
    if(rep.idx<G.highlights.length)startClip();
    else finishReplay();
  }
}
function finishReplay(){
  rep.on=false;
  if(rep.ghost){rep.ghost.visible=false;rep.gBlob.visible=false;}
  player.g.visible=false;passer.g.visible=false; // applyCamMode 重置
  $("lbT").style.height="0";$("lbB").style.height="0";
  $("repUI").style.display="none";
  afterRound();
}

/* ---------------- 百分大战:真实对手(同场竞投) ---------------- */
const OPP={on:false,o:null,guy:null,spotIdx:2,phase:"idle",t:0,pos:null,nextPos:null,curve:null,ballOut:null,
  spotShots:0,coolUntil:null,forceMove:false};
function mirrorSpot(p){
  // X 镜像:你在左,他在右。中线点位(x≈0,如弧顶/中场)给对手一个固定右偏,避免重叠
  if(Math.abs(p.x)<0.6)return V3(p.x+1.9,p.y,p.z);
  return V3(-p.x,p.y,p.z);
}
const OPP_MIN_SEP=1.58;
function battlePlayerPos(){
  if(G.mode==="battle"&&P&&P.pos)return P.pos;
  const sp=BATTLE_SPOTS[G.battleSpot||0];
  return sp?sp.p:null;
}
function avoidPlayerOverlap(pos,i){
  const pp=battlePlayerPos();if(!pp)return pos;
  const dx=pos.x-pp.x,dz=pos.z-pp.z,d=Math.hypot(dx,dz);
  if(d>=OPP_MIN_SEP){
    pos.x=clamp(pos.x,-COURT.halfWidth+.55,COURT.halfWidth-.55);
    pos.z=clamp(pos.z,COURT.nearBaseline+.55,COURT.playMaxZ);
    return pos;
  }
  const toHoop=HOOP.clone().sub(pos);toHoop.y=0;
  if(toHoop.lengthSq()<0.0001)toHoop.set(0,0,-1);
  toHoop.normalize();
  const side=V3(toHoop.z,0,-toHoop.x);
  if(side.lengthSq()<0.0001)side.set(1,0,0);
  side.normalize();
  const away=V3(dx,0,dz);
  if(away.lengthSq()<0.0001)away.copy(side).multiplyScalar(pos.x>=0?1:-1);
  else away.normalize();
  const sideSign=pos.x>=0?1:-1;
  const push=Math.max(OPP_MIN_SEP-d,0.78);
  pos.addScaledVector(away,push);
  pos.addScaledVector(side,sideSign*0.44);
  // 对手的防重叠偏移也必须留在同一半场，不允许被推到中线外。
  pos.x=clamp(pos.x,-COURT.halfWidth+.55,COURT.halfWidth-.55);
  pos.z=clamp(pos.z,COURT.nearBaseline+.55,COURT.playMaxZ);
  return pos;
}
function oppSpotPos(i){
  const sp=BATTLE_SPOTS[i];return sp?avoidPlayerOverlap(mirrorSpot(sp.p),i):V3(0,0,0);
}
function oppSpotQuota(i){
  const sp=BATTLE_SPOTS[i];
  if(sp.super)return 1;
  if(sp.deep!=null)return 2;
  return 5;
}
function oppSpotCooldown(i){
  const sp=BATTLE_SPOTS[i];
  if(sp.super)return 7.2;
  if(sp.deep!=null)return 3.4;
  return 2.1;
}
function oppSpotReady(i){
  return !OPP.coolUntil||G.tNow>=(OPP.coolUntil[i]||0);
}
function oppMarkSpotUse(){
  OPP.spotShots=(OPP.spotShots||0)+1;
  OPP.forceMove=false;
  if(OPP.spotIdx===7)G.superStock=Math.max(0,(G.superStock||0)-1);
  if(OPP.spotShots>=oppSpotQuota(OPP.spotIdx)){
    if(!OPP.coolUntil)OPP.coolUntil=Array(BATTLE_SPOTS.length).fill(0);
    OPP.coolUntil[OPP.spotIdx]=G.tNow+oppSpotCooldown(OPP.spotIdx);
    OPP.forceMove=true;
  }
}
function oppBeginLoad(){
  const sp=BATTLE_SPOTS[OPP.spotIdx],g=OPP.guy;

function updOppShooter(dt){

/* ---- 空中球碰撞:撞击改变结果(原本进的被撞歪→不进) ---- */
function checkBallCollisions(){
  for(let i=0;i<balls.length;i++){
    const a=balls[i];if(a.phase!=="fly")continue;
    for(let j=i+1;j<balls.length;j++){
      const b=balls[j];if(b.phase!=="fly")continue;
      if(a.collided&&b.collided)continue;
      // 只有玩家球 vs 对手球之间才判定(同一人的球不互撞)
      if(!!a.opp===!!b.opp)continue;
      const dx=a.mesh.position.x-b.mesh.position.x;
      const dy=a.mesh.position.y-b.mesh.position.y;
      const dz=a.mesh.position.z-b.mesh.position.z;
      const d2=dx*dx+dy*dy+dz*dz;
      if(d2<0.34*0.34){ // 球半径~0.17,两球接触
        ballCollide(a,b);
      }
    }
  }
}
function ballCollide(a,b){
  a.collided=b.collided=true;
  // 互相弹开:沿连线方向给一个横向偏移速度
  const n=V3(a.mesh.position.x-b.mesh.position.x,a.mesh.position.y-b.mesh.position.y,a.mesh.position.z-b.mesh.position.z);
  if(n.length()<0.001)n.set(rnd(-1,1),0.4,rnd(-1,1));
  n.normalize();
  // 原本要进的球被撞 → 改判不进(转 free 落体飞出)
  [[a,1],[b,-1]].forEach(([ball,sgn])=>{
    const wasSwish=ball.outcome==="swish";
    sClank();
    ball.phase="free";
    const vy=ball.v0.y-9.8*ball.t;
    ball.vel.set(ball.v0.x+sgn*n.x*2.6,Math.max(vy,1.2)+1.0,ball.v0.z+sgn*n.z*2.6);
    ball.outcome="rimout";
    ball.life=1.4;
    if(wasSwish){
      if(ball.opp){toast("💥 空中相撞!对手没进!","#7CFC6B");}
      else{toast("💥 空中相撞!你的球被打飞!","#ff8d7a");if(!ball.silent)missBall();}
    }
  });
  // 撞击反馈
  cheerSound(false);if(navigator.vibrate)navigator.vibrate([15,30,15]);
  popScore("💥","#fff");
}

const _wcGhost=new THREE.Vector3();
function winCineBallAt(recT){
  const w=winCine;

  const r=w.rec;let j=1;while(j<r.length&&r[j][0]<recT)j++;

    for(let b=0;b<5;b++){
      const v=(rk===money||b===4)?2:1;
      if(Math.random()<p)pts+=v;
    }
    total+=pts;ev.push({l:"第"+(rk+1)+"架",p:pts,max:rk===money?10:6});
    if(rk===1||rk===2){
      const dp=Math.random()<p*0.82?3:0;total+=dp;
      ev.push({l:"深远球",p:dp,max:3});
    }
  }
  return {ev,total};
}

/* ---------------- device tilt (手机左右倾斜影响球路) ---------------- */
const TILT={raw:0,base:0,on:false};
function tiltDeg(){return TILT.on?clamp(TILT.raw-TILT.base,-30,30):0;}
addEventListener("deviceorientation",e=>{
  if(e.gamma==null&&e.beta==null)return;
  const a=(screen.orientation&&screen.orientation.angle!=null)?screen.orientation.angle:(window.orientation||0);
  let g;
  if(a===90)g=e.beta;else if(a===-90||a===270)g=e.beta==null?null:-e.beta;else g=e.gamma;
  if(g==null)return;
  TILT.on=true;TILT.raw=g;
  updTiltUI();
});
function calibrateTilt(){TILT.base=TILT.raw;}
function updTiltUI(){
  const w=$("tiltWrap");if(!w)return;
  const show=TILT.on&&(G.state==="round"||G.state==="tiebreak"||G.state==="battle"||G.state==="rackrush");

/* ---------------- main loop ---------------- */
const clock=new THREE.Clock();
let jumboAcc=0,lowBeep=0,menuFrameAcc=0,visionAmbienceAcc=0;
function animate(){
  requestAnimationFrame(animate);
  let dt=Math.min(0.05,clock.getDelta());
  updateVisualOverlays();
  // 菜单有全屏封面覆盖，15fps 足够保留背景氛围，避免手机开赛前就满负荷。
  if(G.state==="menu"||G.state==="diff"){
    menuFrameAcc+=dt;
    if(menuFrameAcc<1/15)return;
    dt=Math.min(.05,menuFrameAcc);menuFrameAcc=0;
  }
  if(PAUSE.on){
    updatePauseButton();
    camera.position.copy(rig.pos);
    camera.lookAt(rig.look);
    camera.updateMatrixWorld();
    renderer.render(scene,camera);
    return;
  }
  G.tNow+=dt;
  updateEnvironment(dt);
  updateSceneAudio(dt);
  updTweens(dt);
  const frozen=!!G.cutAway||!!G.battleCut;
  if(!frozen){updBalls(dt);updPose(dt);updPass(dt);updWalk(dt);}
  if(G.state==="aishow")updShow(dt);
  if(G.state==="battle"&&!G.battleCut)updBattle(dt);
  if(G.state==="rackrush")updateRackRush(dt);
  if(G.state==="pregame")updPreGameShow(dt);
  updFire(dt);
  updConf(dt);
  G.cheer=Math.max(0,G.cheer-dt*0.5);
  visionAmbienceAcc+=dt;
  if(visionAmbienceAcc>=1/12){visionAmbienceAcc=0;updCrowd(G.tNow);updBackcourtShow(G.tNow);}
  if(netPulse>0){netPulse-=dt*3;const s=1+netPulse*0.35;netMesh.scale.set(s,1+netPulse*0.5,s);}
  // 反超特写排队
  if(G.state==="round"&&!frozen)tryCutAway();
  if(G.cutAway)updCutAway(dt);
  if(G.battleCut)updBattleCut(dt);
  // 练习结束检测
  if(G.practice&&G.state==="round"&&G.shotIdx>=G.seq.length&&balls.length===0&&!G.charging&&!passing){
    endPractice();
  }
  // states
  if(G.state==="round"&&G.running&&!G.practice){
    G.timer-=dt;
    if(G.timer<35&&!G.organed){G.organed=true;organCharge();}
    const tl=$("hudTimer"),tv=Math.max(0,G.timer).toFixed(1);
    if(tl.textContent!==tv)tl.textContent=tv;
    const tc=G.timer<=10?"low":"";if(tl.className!==tc)tl.className=tc;
    if(G.timer<=5&&G.timer>0&&G.tNow-lowBeep>1){lowBeep=G.tNow;sBeep();}
    jumboAcc+=dt;if(jumboAcc>0.5){jumboAcc=0;updJumbo();}
    if(G.timer<=0&&!G.buzzed){
      G.buzzed=true;sBuzz();paSay("时间到!",true);
      if(G.charging)doRelease();
      G.canShoot=false;G.charging=false;handBall.visible=false;
      toast("⏱ 时间到!","#ff8d7a");
    }
    const done=G.buzzed||G.shotIdx>=G.seq.length;
    if(done&&balls.length===0&&!G.charging){endRound();}
  }
  if(G.state==="tiebreak"){
    if(G.shotIdx>=G.seq.length&&balls.length===0&&!G.charging){
      G.state="tiebreak-wait";setTimeout(tiebreakResolve,600);
    }
  }
  if(G.charging){
    G.power=Math.min(100,G.power+playerChargeRate()*dt);
    const _ph=Math.round(G.power)+"%";if($("pFill").style.height!==_ph)$("pFill").style.height=_ph;
  }else hidePlayerPowerUI();
  // cameras
  if(rep.on)updReplay(dt);
  else if(winCine.on)updWinCine(dt);
  else if(hero.on)updHero(dt);
  else if(G.cutAway){/* updCutAway 已控制镜头 */}
  else if(G.battleCut){/* updBattleCut 已控制镜头 */}
  else if(G.state==="pregame"){/* updPreGameShow 已控制镜头 */}
  else if(G.state==="aishow")updShowCam();
  else if(["menu","diff","intro","roundend","sim","bracket","champion","runnerup","eliminated","battleend","rushend"].includes(G.state)){
    const a=G.tNow*0.1;
    rig.pos.set(Math.cos(a)*18,8+Math.sin(G.tNow*0.3)*0.5,COURT.midZ+Math.sin(a)*20);
    rig.look.set(0,2.2,COURT.midZ);
  }
  else if((G.state==="round"||G.state==="tiebreak"||G.state==="battle"||G.state==="rackrush")&&!G.glideCam)updPlayCam(dt);
  updateRenderQuality(dt);
  camera.position.copy(rig.pos);
  camera.lookAt(rig.look);
  camera.updateMatrixWorld();
  updatePlayerPowerUI();
  updatePauseButton();
  renderer.render(scene,camera);
  updSpotDots();
}

/* ---------------- boot ---------------- */
buildCourt();
const seatList=buildStands();
buildBackcourtShow();
buildCrowd(seatList);
buildHoop();
buildAtmos();
buildRacks();
buildHands();
buildCharacters();
buildSpotDots();
applyScenePreset(currentScenePreset,{persist:false});
applyCamMode();
handBall.visible=false;
bootGame();
animate();
</script>
