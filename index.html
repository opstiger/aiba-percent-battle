  G.tiebreakN++;
  showPanel(`<h1 class="title" style="font-size:22px">⚖ ${G.finalScore} : ${G.aiFinal} 平分!</h1>
    <div class="note">突然死亡决胜球 · 各投 1 记深远三分<br>你先出手 · 命中且对手打铁即夺冠</div>
    <button class="btn gold" onclick="doTiebreak()">出手决胜球!</button>`);
}
function doTiebreak(){
  hidePanel();
  G.seq=[{deep:Math.random()<0.5?0:1,val:3,money:false,rack:null}];
  G.shotIdx=0;G.shots=[];G.buzzed=false;G.running=false;
  deepBalls.forEach(m=>m.visible=true);
  $("hud").style.display="block";$("hudTimer").style.display="block";$("hudTimer").textContent="决胜";
  G.state="tiebreak";
  const tb=DEEPS[G.seq[0].deep].p;
  P.pos.copy(tb);P.face=faceTo(tb,HOOP);P.walking=false;
  applyCamMode();
  const eye=shotEye(G.seq[0]);
  glideTo(eye,HOOP.clone().add(V3(0,0.15,0)),1,()=>{readyBall();toast("一球定冠军!","#ffd23f");});
}
function tiebreakResolve(){
  endHero();applyCamMode();
  const meMade=G.shots[0]&&G.shots[0].made;
  const aiMade=Math.random()<aiProb(G.finalist.r)*0.85;
  $("hud").style.display="none";
  const txt=`你 ${meMade?"命中 ✅":"打铁 ❌"} · ${G.finalist.n} ${aiMade?"命中 ✅":"打铁 ❌"}`;
  if(meMade&&!aiMade){toast(txt);champion(true);}
  else if(!meMade&&aiMade){toast(txt);runnerUp(true);}
  else if(G.tiebreakN>=3){champion(true,"鏖战三轮 险胜!");}
  else{
    showPanel(`<h1 class="title" style="font-size:20px">${txt}</h1>
      <div class="note">仍未分胜负 · 再来一球!</div>
      <button class="btn gold" onclick="startTiebreak()">继续决胜</button>`);
  }
}
function champion(tb,extra){
  airhorn();setTimeout(airhorn,700);
  djSay("新科三分王,诞生了!",true);
  G.state="champion";music(true,true);
  startConfetti();G.cheer=1;cheerSound(true);
  setTimeout(()=>cheerSound(true),1500);
  showPanel(`<div style="font-size:64px;animation:blink 1.2s steps(2) infinite">🏆</div>
    <h1 class="title">aiBA 冠军诞生!</h1>
    <h2 class="sub">CYBER COURT CHAMPION</h2>
    ${extra?`<div class="note">${extra}</div>`:""}
    <div class="card">决赛 <b>${G.finalScore}</b> : ${G.aiFinal} 击败 <b>${G.finalist.n}</b>${tb?" (决胜球)":""}<br>
      最高连中 <b class="flame">x${G.stats.best}</b> · 花球 <b>${G.stats.moneyM}/${G.stats.moneyT}</b> · 深远 <b>${G.stats.deepM}/${G.stats.deepT}</b><br>
      难度:<b>${DIFFS[G.diff].n}</b></div>
    <button class="btn gold" onclick="shareScore(true)">📤 生成战报海报</button>
    <button class="btn green" onclick="location.reload()">再来一届</button>`);
}
function runnerUp(tb){
  paSay("屈居亚军,虽败犹荣,观众把掌声送给你!",true);
  G.state="runnerup";
  showPanel(`<div style="font-size:54px">🥈</div>
    <h1 class="title" style="font-size:24px">亚军 · 虽败犹荣</h1>
    <div class="card">决赛 <b>${G.finalScore}</b> : ${G.aiFinal} 不敌 <b>${G.finalist.n}</b>${tb?" (决胜球)":""}<br>
      最高连中 <b class="flame">x${G.stats.best}</b> · 全场为你起立鼓掌</div>
    <button class="btn red" onclick="location.reload()">复仇之战</button>
    <button class="btn sm" onclick="shareScore(false)">生成战报海报</button>`);
}
function shareScore(champ){
  genPoster(champ);
}
function genPoster(champ){
  const W=640,H=960;
  const cv=document.createElement("canvas");cv.width=W;cv.height=H;
  const c=cv.getContext("2d");
  // 背景:球馆夜 + 网格
  const g=c.createLinearGradient(0,0,0,H);
  g.addColorStop(0,"#0a0c18");g.addColorStop(1,"#101426");
  c.fillStyle=g;c.fillRect(0,0,W,H);
  c.strokeStyle="rgba(255,255,255,0.04)";c.lineWidth=1;
  for(let x=0;x<W;x+=24){c.beginPath();c.moveTo(x,0);c.lineTo(x,H);c.stroke();}
  for(let y=0;y<H;y+=24){c.beginPath();c.moveTo(0,y);c.lineTo(W,y);c.stroke();}
  // 像素篮球
  c.fillStyle="#e8771e";c.beginPath();c.arc(W/2,76,38,0,7);c.fill();
  c.strokeStyle="#1f130a";c.lineWidth=3;
  c.beginPath();c.moveTo(W/2-38,76);c.lineTo(W/2+38,76);c.stroke();
  c.beginPath();c.moveTo(W/2,38);c.lineTo(W/2,114);c.stroke();
  c.beginPath();c.arc(W/2,76,38,0,7);c.stroke();
  // 标题
  c.font="bold 42px sans-serif";c.textAlign="center";
  c.fillStyle="#000";c.fillText(GAME_NAME,W/2+2,164+2);
  c.fillStyle="#ffd23f";c.fillText(GAME_NAME,W/2,164);
  // 结果
  c.font="bold 22px sans-serif";c.fillStyle="#dde";
  c.fillText(champ?"🏆 夺冠了!":"挑战结束",W/2,216);
  const sc=champ?G.finalScore:(G.finalScore||G.semiScore||G.score);
  c.font="bold 88px sans-serif";
  c.fillStyle="#000";c.fillText(sc,W/2+3,328+3);
  c.fillStyle="#ffd23f";c.fillText(sc,W/2,328);
  c.font="bold 18px sans-serif";c.fillStyle="#8fa3c8";c.fillText("分",W/2+60,328);
  // 对手
  if(G.finalist){
    c.font="bold 20px sans-serif";c.fillStyle="#dde";
    c.fillText((champ?"击败":"惜败")+" "+G.finalist.n+" ("+G.finalist.num+"号)",W/2,380);
  }
  // 统计卡
  const stats=[
    ["🔥","最高连中","x"+G.stats.best],
    ["💰","花球命中",G.stats.moneyM+"/"+G.stats.moneyT],
    ["⚡","深远三分",G.stats.deepM+"/"+G.stats.deepT],
    ["🎮","难度",DIFFS[G.diff].n]
  ];
  c.fillStyle="rgba(30,42,70,0.5)";c.fillRect(40,420,W-80,200);
  c.strokeStyle="rgba(255,210,63,0.3)";c.lineWidth=2;c.strokeRect(40,420,W-80,200);
  stats.forEach((st,i)=>{
    const y=455+i*45;
    c.font="18px sans-serif";c.textAlign="left";
    c.fillStyle="#fff";c.fillText(st[0]+" "+st[1],70,y);
    c.textAlign="right";c.fillStyle="#ffd23f";c.font="bold 22px sans-serif";
    c.fillText(st[2],W-70,y);
  });
  // 对战标识
  c.textAlign="center";c.font="bold 16px monospace";c.fillStyle="#7ee7ff";
  c.fillText("aiBA CYBER COURT · RACE TO 100",W/2,660);
  // 对手阵容
  c.font="14px sans-serif";c.fillStyle="#9ab";
  const names=G.opponents.map(o=>o.n+"#"+o.num).join(" · ");
  c.fillText("对阵:"+names,W/2,692);
  // 战报腰封
  c.fillStyle="rgba(20,40,72,0.28)";c.fillRect(40,730,W-80,70);
  c.strokeStyle="#4aa3ff";c.lineWidth=2;c.strokeRect(40,730,W-80,70);
  c.font="bold 20px sans-serif";c.fillStyle="#ffd23f";
  c.fillText("霓虹球场已开灯",W/2,762);
  c.font="13px sans-serif";c.fillStyle="#d9f6ff";
  c.fillText("下一场,换你接管最后一投。",W/2,784);
  // 底部 CTA
  c.font="bold 16px sans-serif";c.fillStyle="#dde";
  c.fillText("你能打败库里吗?扫码/点链接挑战同题 →",W/2,850);
  // URL
  c.font="12px monospace";c.fillStyle="#7a8faa";
  try{c.fillText(location.origin+location.pathname+"?seed="+GAME_SEED,W/2,878);}catch(e){}
  // 导出
  cv.toBlob(blob=>{
    if(!blob){toast("生成失败","#ff8d7a");return;}
    // 尝试 Web Share API (手机端可直接分享到微信)
    if(navigator.share&&navigator.canShare){
      const file=new File([blob],"block3pt-"+GAME_SEED+".png",{type:"image/png"});
      if(navigator.canShare({files:[file]})){
        navigator.share({files:[file],title:GAME_NAME+" #"+GAME_SEED,
          text:champ?"🏆 我夺冠了! "+sc+"分":"🏀 "+sc+"分 · 你能超过我吗?"
        }).catch(()=>fallbackSave(blob));
        return;
      }
    }
    fallbackSave(blob);
  },"image/png");
}
function fallbackSave(blob){
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download="block3pt-"+GAME_SEED+".png";
  a.click();setTimeout(()=>URL.revokeObjectURL(url),5000);
  toast("战报已保存 · 发到朋友圈吧!","#7CFC6B");
}

/* ---------------- input ---------------- */
function audioGestureUnlock(e){
  if(BOOT_GATE_ACTIVE)return;
  if(e&&e.target&&e.target.id==="muteBtn")return;
  const menuLike=G.state==="menu"||G.state==="diff";
  const arenaLike=G.state==="cinematic"||G.state==="round"||G.state==="tiebreak"||G.state==="battle";
  if(!AC||AC.state==="suspended"||(menuLike&&!audioState().menuMusic))ensureAudio(menuLike,true);
  if(arenaLike&&extA.crowd&&extA.crowd.paused)extPlay("crowd");
  if(arenaLike&&extA.crowdCheer&&extA.crowdCheer.paused)extPlay("crowdCheer");
  syncSceneAmbience();
}
function onDown(e){
  if(BOOT_GATE_ACTIVE)return;
  if(e.target&&e.target.id==="camBtn")return;
  if(e.target&&e.target.closest&&e.target.closest("#visionPreview"))return;
  if(e.target&&e.target.closest&&e.target.closest("#battleControls"))return;
  if(e.target&&e.target.closest&&e.target.closest("#spotDots"))return;
  if(G.state==="round"||G.state==="tiebreak"||G.state==="battle"){e.preventDefault();startCharge();}
}
function onUp(e){
  if(BOOT_GATE_ACTIVE)return;
  if(e.target&&e.target.id==="camBtn")return;
  if(e.target&&e.target.closest&&e.target.closest("#visionPreview"))return;
  if(e.target&&e.target.closest&&e.target.closest("#battleControls"))return;
  if(e.target&&e.target.closest&&e.target.closest("#spotDots"))return;
  if(G.state==="round"||G.state==="tiebreak"||G.state==="battle"){doRelease();}
}
["pointerdown","touchstart","touchend","mousedown","click"].forEach(type=>{
  addEventListener(type,audioGestureUnlock,{passive:true,capture:true});
});
addEventListener("pointerdown",onDown,{passive:false});
addEventListener("pointerup",onUp);
addEventListener("keydown",e=>{
  if(BOOT_GATE_ACTIVE){if(!e.repeat)unlockBoot(e);return;}
  if(!e.repeat)audioGestureUnlock();
  if(e.code==="Space"&&!e.repeat)startCharge();
  if(e.code==="KeyC"&&(G.state==="round"||G.state==="tiebreak"||G.state==="battle"))cycleCam();
  if(G.state==="battle"&&(e.code==="ArrowLeft"||e.code==="KeyA"))battlePrevSpot();
  if(G.state==="battle"&&(e.code==="ArrowRight"||e.code==="KeyD"))battleNextSpot();
});
addEventListener("keyup",e=>{if(e.code==="Space")doRelease();});
addEventListener("contextmenu",e=>e.preventDefault());

/* ---------------- device tilt (手机左右倾斜影响球路) ---------------- */
const TILT={raw:0,base:0,on:false};
function tiltDeg(){return TILT.on?clamp(TILT.raw-TILT.base,-30,30):0;}
addEventListener("deviceorientation",e=>{
  if(e.gamma==null&&e.beta==null)return;
  const a=(screen.orientation&&screen.orientation.angle!=null)?screen.orientation.angle:(window.orientation||0);
  let g;
  if(a===90)g=e.beta;else if(a===-90||a===270)g=e.beta==null?null:-e.beta;else g=e.gamma;
  if(g==null)return;
  TILT.on=true;TILT.raw=g;
  updTiltUI();
});
function calibrateTilt(){TILT.base=TILT.raw;}
function updTiltUI(){
  const w=$("tiltWrap");if(!w)return;
  const show=TILT.on&&(G.state==="round"||G.state==="tiebreak"||G.state==="battle");
  w.style.display=show?"block":"none";
  if(!show)return;
  const d=tiltDeg();
  const dot=$("tiltDot");
  dot.style.left=(50+clamp(d,-25,25)*1.8)+"%";
  dot.style.background=Math.abs(d)<4?"#7CFC6B":(Math.abs(d)<10?"#ffd23f":"#ff5d4d");
}
function askTiltPerm(){
  try{
    if(typeof DeviceOrientationEvent!=="undefined"&&typeof DeviceOrientationEvent.requestPermission==="function")
      DeviceOrientationEvent.requestPermission().catch(()=>{});
  }catch(e){}
}

/* ---------------- main loop ---------------- */
const clock=new THREE.Clock();
let jumboAcc=0,lowBeep=0,menuFrameAcc=0,visionAmbienceAcc=0;
function animate(){
  requestAnimationFrame(animate);
  let dt=Math.min(0.05,clock.getDelta());
  // 菜单有全屏封面覆盖，15fps 足够保留背景氛围，避免手机开赛前就满负荷。
  if(G.state==="menu"||G.state==="diff"){
    menuFrameAcc+=dt;
    if(menuFrameAcc<1/15)return;
    dt=Math.min(.05,menuFrameAcc);menuFrameAcc=0;
  }
  G.tNow+=dt;
  updateEnvironment(dt);
  updateSceneAudio(dt);
  updTweens(dt);
  const frozen=!!G.cutAway||!!G.battleCut;
  if(!frozen){updBalls(dt);updPose(dt);updPass(dt);updWalk(dt);}
  if(G.state==="aishow")updShow(dt);
  if(G.state==="battle"&&!G.battleCut)updBattle(dt);
  updFire(dt);
  updConf(dt);
  G.cheer=Math.max(0,G.cheer-dt*0.5);
  visionAmbienceAcc+=dt;
  if(visionAmbienceAcc>=1/12){visionAmbienceAcc=0;updCrowd(G.tNow);updBackcourtShow(G.tNow);}
  if(netPulse>0){netPulse-=dt*3;const s=1+netPulse*0.35;netMesh.scale.set(s,1+netPulse*0.5,s);}
  // 反超特写排队
  if(G.state==="round"&&!frozen)tryCutAway();
  if(G.cutAway)updCutAway(dt);
  if(G.battleCut)updBattleCut(dt);
  // 练习结束检测
  if(G.practice&&G.state==="round"&&G.shotIdx>=G.seq.length&&balls.length===0&&!G.charging&&!passing){
    endPractice();
  }
  // states
  if(G.state==="round"&&G.running&&!G.practice){
    G.timer-=dt;
    if(G.timer<35&&!G.organed){G.organed=true;organCharge();}
    const tl=$("hudTimer"),tv=Math.max(0,G.timer).toFixed(1);
    if(tl.textContent!==tv)tl.textContent=tv;
    const tc=G.timer<=10?"low":"";if(tl.className!==tc)tl.className=tc;
    if(G.timer<=5&&G.timer>0&&G.tNow-lowBeep>1){lowBeep=G.tNow;sBeep();}
    jumboAcc+=dt;if(jumboAcc>0.5){jumboAcc=0;updJumbo();}
    if(G.timer<=0&&!G.buzzed){
      G.buzzed=true;sBuzz();paSay("时间到!",true);
      if(G.charging)doRelease();
      G.canShoot=false;G.charging=false;handBall.visible=false;
      toast("⏱ 时间到!","#ff8d7a");
    }
    const done=G.buzzed||G.shotIdx>=G.seq.length;
    if(done&&balls.length===0&&!G.charging){endRound();}
  }
  if(G.state==="tiebreak"){
    if(G.shotIdx>=G.seq.length&&balls.length===0&&!G.charging){
      G.state="tiebreak-wait";setTimeout(tiebreakResolve,600);
    }
  }
  if(G.charging){
    G.power=Math.min(100,G.power+playerChargeRate()*dt);
    const _ph=Math.round(G.power)+"%";if($("pFill").style.height!==_ph)$("pFill").style.height=_ph;
  }
  // cameras
  if(rep.on)updReplay(dt);
  else if(winCine.on)updWinCine(dt);
  else if(hero.on)updHero(dt);
  else if(G.cutAway){/* updCutAway 已控制镜头 */}
  else if(G.battleCut){/* updBattleCut 已控制镜头 */}
  else if(G.state==="aishow")updShowCam();
  else if(["menu","diff","intro","roundend","sim","bracket","champion","runnerup","eliminated","battleend"].includes(G.state)){
    const a=G.tNow*0.1;
    rig.pos.set(Math.cos(a)*18,8+Math.sin(G.tNow*0.3)*0.5,COURT.midZ+Math.sin(a)*20);
    rig.look.set(0,2.2,COURT.midZ);
  }
  else if((G.state==="round"||G.state==="tiebreak"||G.state==="battle")&&!G.glideCam)updPlayCam(dt);
  camera.position.copy(rig.pos);
  camera.lookAt(rig.look);
  renderer.render(scene,camera);
  updSpotDots();
}

/* ---------------- boot ---------------- */
buildCourt();
const seatList=buildStands();
buildBackcourtShow();
buildCrowd(seatList);
buildHoop();
buildAtmos();
buildRacks();
buildHands();
buildCharacters();
buildSpotDots();
applyScenePreset(currentScenePreset,{persist:false});
applyCamMode();
handBall.visible=false;
bootGame();
animate();
</script>
