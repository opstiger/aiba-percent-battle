<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>aiBA·百分大战 v1.16</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#04050a;touch-action:none;user-select:none;-webkit-user-select:none;
  font-family:"Courier New",ui-monospace,monospace;color:#fff}
#c{position:fixed;inset:0;width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges}
.px{text-shadow:2px 2px 0 #000;letter-spacing:1px;font-weight:bold}
#scan{position:fixed;inset:0;pointer-events:none;z-index:60;opacity:.10;
  background:repeating-linear-gradient(0deg,transparent 0 3px,#000 3px 4px)}
#vig{position:fixed;inset:0;pointer-events:none;z-index:59;
  background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.55) 100%)}
/* ---------- HUD ---------- */
#hud{position:fixed;inset:0;pointer-events:none;z-index:40;display:none}
#hudTimer{position:absolute;top:max(10px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);
  font-size:34px;color:#ffd23f;text-shadow:3px 3px 0 #000;font-weight:bold;letter-spacing:2px}
#hudTimer.low{color:#ff4040;animation:blink .5s steps(2) infinite}
@keyframes blink{50%{opacity:.25}}
#hudScore{position:absolute;top:max(10px,env(safe-area-inset-top));right:12px;text-align:right}
#hudScore .big{font-size:30px;color:#7CFC6B;font-weight:bold;text-shadow:3px 3px 0 #000}
#hudScore .sm{font-size:11px;color:#bbb;text-shadow:2px 2px 0 #000}
#hudRound{position:absolute;top:max(10px,env(safe-area-inset-top));left:12px;font-size:12px;color:#9fd1ff;
  text-shadow:2px 2px 0 #000;line-height:1.7;font-weight:bold}
#hudRack{position:absolute;top:58px;left:50%;transform:translateX(-50%);text-align:center}
#hudRackName{font-size:13px;color:#fff;text-shadow:2px 2px 0 #000;font-weight:bold}
#hudDots{margin-top:5px;display:flex;gap:6px;justify-content:center}
#hudDots i{width:12px;height:12px;display:block;background:#e8771e;border:2px solid #000;box-shadow:inset -2px -2px 0 rgba(0,0,0,.4)}
#hudDots i.gold{background:#ffcf2e}#hudDots i.deep{background:#54e05a}
#hudDots i.used{background:#333;box-shadow:none;opacity:.5}
#hudStreak{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:20px;font-weight:bold;
  color:#ff7b1c;text-shadow:2px 2px 0 #000;display:none}
#hint{position:absolute;bottom:max(14px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
  font-size:12px;color:#ddd;text-shadow:2px 2px 0 #000;text-align:center;font-weight:bold;width:92%}
/* power bar */
#powerWrap{position:absolute;right:14px;top:50%;transform:translateY(-50%);width:26px;height:46vh;max-height:330px;
  background:#15151c;border:3px solid #000;box-shadow:0 0 0 2px #3a3a48,inset 0 0 12px #000}
#pZone{position:absolute;left:0;width:100%;background:rgba(110,255,110,.30);border-top:2px solid #6eff6e;border-bottom:2px solid #6eff6e}
#pSweet{position:absolute;left:0;width:100%;background:rgba(110,255,110,.45)}
#pFill{position:absolute;bottom:0;left:0;width:100%;height:0%;
  background:linear-gradient(0deg,#2e8bff,#39d3ff 55%,#ffd23f 78%,#ff4040)}
#pTag{position:absolute;right:34px;font-size:10px;color:#6eff6e;text-shadow:1px 1px 0 #000;white-space:nowrap;font-weight:bold}
#tiltWrap{position:absolute;left:50%;bottom:88px;transform:translateX(-50%);width:150px;height:10px;background:rgba(0,0,0,.45);border:2px solid #333;display:none}
#tiltCenter{position:absolute;left:50%;top:-3px;width:2px;height:14px;background:#888}
#tiltDot{position:absolute;top:-2px;left:50%;width:10px;height:10px;margin-left:-5px;background:#7CFC6B;border:1px solid #000;transition:left .08s linear}
#tiltLbl{position:absolute;top:-17px;left:50%;transform:translateX(-50%);font-size:9px;color:#9ab;white-space:nowrap;text-shadow:1px 1px 0 #000}
#battleControls{position:absolute;bottom:max(44px,calc(env(safe-area-inset-bottom) + 34px));left:50%;transform:translateX(-50%);
  display:none;align-items:center;gap:8px;pointer-events:auto;background:rgba(0,0,0,.62);border:2px solid #27364a;
  box-shadow:0 0 0 2px rgba(255,255,255,.06),inset 0 0 14px rgba(0,0,0,.65);padding:8px 10px}
#battleControls button{width:34px;height:34px;border:2px solid #000;background:#26384a;color:#fff;font-weight:bold;font-size:18px;
  font-family:inherit;box-shadow:inset 2px 2px 0 rgba(255,255,255,.18),inset -2px -2px 0 rgba(0,0,0,.45)}
#battleSpotName{min-width:156px;text-align:center;font-size:11px;font-weight:bold;color:#ffd23f;text-shadow:2px 2px 0 #000;line-height:1.35}
#spotDots{position:absolute;inset:0;pointer-events:none;z-index:20;display:none}
#spotDots .spot{position:absolute;transform:translate(-50%,-50%);pointer-events:auto;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:2px;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
/* 点位标记已融入地板,屏幕上只保留一个极低调的隐形点击热区,不再有浮动文字 */
#spotDots .ring{width:34px;height:34px;border-radius:50%;border:1.5px solid rgba(124,252,107,.22);
  background:rgba(124,252,107,.04);transition:transform .1s}
#spotDots .spot.cur .ring{border-color:rgba(255,210,63,.0);background:transparent}
#spotDots .spot.super .ring{border-color:rgba(255,141,58,.28)}
#spotDots .spot.locked{opacity:.5}
#spotDots .spot.locked .ring{border-color:rgba(108,116,128,.3);background:transparent}
#spotDots .lbl{display:none}
#spotDots .spot:active .ring{transform:scale(.85);border-color:rgba(255,210,63,.6)}
#battleScore{position:absolute;top:max(8px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);
  display:none;flex-direction:column;align-items:center;gap:3px;z-index:30;
  background:rgba(5,8,16,.72);border:2px solid #000;border-radius:8px;padding:5px 14px;min-width:210px}
#battleScore #bsVS{font-size:11px;color:#9ab;margin:0 8px}
#battleScore>span{font-size:13px;color:#fff;font-weight:bold;text-shadow:1px 1px 0 #000}
#bsMeNum{color:#7CFC6B;font-size:22px}
#bsOppNum{color:#ff8d7a;font-size:22px}
#bsMe.lead #bsMeNum,#bsOpp.lead #bsOppNum{text-shadow:0 0 8px currentColor}
#bsRace{position:relative;width:190px;height:6px;background:rgba(255,255,255,.12);border-radius:3px;overflow:hidden}
#bsRace i{position:absolute;top:0;height:100%;left:0;border-radius:3px;transition:width .3s}
#bsRaceMe{background:#7CFC6B;opacity:.9}
#bsRaceOpp{background:#ff8d7a;opacity:.6}
#midBtn{position:absolute;bottom:max(86px,calc(env(safe-area-inset-bottom) + 76px));left:50%;transform:translateX(-50%);
  display:none;z-index:25;background:linear-gradient(#ff8d3a,#e0531f);color:#fff;font-weight:bold;font-size:13px;
  border:2px solid #000;border-radius:18px;padding:8px 18px;box-shadow:0 3px 0 #000;cursor:pointer;pointer-events:auto;
  text-shadow:1px 1px 0 rgba(0,0,0,.5)}
#midBtn.cur{background:linear-gradient(#ffd23f,#e0a020);box-shadow:0 0 12px rgba(255,210,63,.8)}
#midBtn:active{transform:translateX(-50%) translateY(2px);box-shadow:0 1px 0 #000}
#edgeArrows{position:absolute;inset:0;pointer-events:none;z-index:21;display:none}
#edgeArrows .ea{position:absolute;transform:translate(-50%,-50%);pointer-events:auto;cursor:pointer;
  background:rgba(5,8,16,.5);border:1.5px solid rgba(124,252,107,.5);border-radius:50%;width:26px;height:26px;
  display:flex;align-items:center;justify-content:center;font-size:13px;
  font-weight:bold;color:#7CFC6B;text-shadow:1px 1px 0 #000;animation:eapulse 1.4s ease-in-out infinite}
#edgeArrows .ea.super{border-color:#ff8d3a;color:#ffb27a}
@keyframes eapulse{0%,100%{opacity:.7}50%{opacity:1}}
#battleOppScore{font-size:10px;color:#9fd1ff;text-shadow:1px 1px 0 #000}
#camBtn{position:absolute;top:max(58px,calc(env(safe-area-inset-top) + 48px));right:12px;background:rgba(0,0,0,.55);
  border:2px solid #444;color:#cde;font-size:11px;font-weight:bold;padding:7px 9px;cursor:pointer;
  pointer-events:auto;user-select:none;display:none}
#camBtn:active{background:#2a2a2a}
#heroTag{position:absolute;top:max(12vh,72px);left:50%;transform:translateX(-50%);font-size:15px;font-weight:bold;
  color:#ffd23f;text-shadow:2px 2px 0 #000;display:none;animation:blink 1s steps(2) infinite;white-space:nowrap}
#muteBtn{position:fixed;top:max(98px,calc(env(safe-area-inset-top) + 88px));right:12px;z-index:48;font-size:18px;
  background:rgba(0,0,0,.5);border:2px solid #333;padding:6px 9px;cursor:pointer;pointer-events:auto}
#hudTarget{position:absolute;top:max(86px,calc(env(safe-area-inset-top) + 76px));left:14px;font-size:11px;
  font-weight:bold;text-shadow:1px 1px 0 #000;color:#ffd23f}
#vsBanner{position:absolute;top:24vh;left:50%;transform:translateX(-50%);text-align:center;
  font-size:20px;font-weight:bold;color:#fff;text-shadow:3px 3px 0 #000;background:rgba(0,0,0,.55);
  border:3px solid #ffd23f;padding:12px 18px;display:none;white-space:nowrap;z-index:46}
#showUI{position:fixed;top:max(10px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.6);border:2px solid #333;padding:8px 12px;display:none;z-index:45;
  font-size:13px;color:#dde;white-space:nowrap;display:none}
#showUI .btn{margin:0 0 0 8px;padding:5px 9px;font-size:11px}
/* toasts & pops */
#toast{position:fixed;top:24%;left:50%;transform:translateX(-50%);z-index:45;font-size:24px;font-weight:bold;
  text-shadow:3px 3px 0 #000;opacity:0;transition:opacity .15s;pointer-events:none;text-align:center}
#pops{position:fixed;inset:0;z-index:44;pointer-events:none}
.pop{position:absolute;font-size:30px;font-weight:bold;text-shadow:3px 3px 0 #000;animation:popUp 1.1s forwards}
@keyframes popUp{0%{transform:translate(-50%,0) scale(.6);opacity:0}15%{opacity:1;transform:translate(-50%,-14px) scale(1.15)}100%{transform:translate(-50%,-90px) scale(1);opacity:0}}
#countN{position:fixed;inset:0;z-index:46;display:none;align-items:center;justify-content:center;
  font-size:110px;font-weight:bold;color:#ffd23f;text-shadow:6px 6px 0 #000;pointer-events:none}
/* replay */
#lbT,#lbB{position:fixed;left:0;width:100%;height:0;background:#000;z-index:48;transition:height .4s}
#lbT{top:0}#lbB{bottom:0}
#repUI{position:fixed;inset:0;z-index:49;display:none;pointer-events:none}
#repTag{position:absolute;top:max(12vh,70px);left:18px;font-size:16px;font-weight:bold;color:#ff4040;text-shadow:2px 2px 0 #000;animation:blink 1s steps(2) infinite}
#repCam{position:absolute;top:max(12vh,70px);right:18px;font-size:12px;color:#ddd;text-shadow:2px 2px 0 #000;font-weight:bold}
#repSkip{position:absolute;bottom:max(12vh,70px);right:18px;pointer-events:auto}
/* overlay & panels */
#ov{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;
  background:rgba(4,6,12,.72)}
#ovBox{max-width:560px;width:92%;max-height:88vh;overflow-y:auto;background:#1b1b24;border:4px solid #000;
  box-shadow:0 0 0 3px #4a4a5e,0 14px 0 rgba(0,0,0,.5);padding:22px 18px;text-align:center}
#ov.cover-menu{align-items:stretch;justify-content:stretch;background:#03040a}
#ov.cover-menu #ovBox{max-width:none;width:100%;max-height:none;height:100%;overflow:hidden;border:0;box-shadow:none;padding:0;background:#03040a;text-align:left}
.coverHero{position:relative;width:100%;height:100%;min-height:100vh;background-size:cover;background-position:center;isolation:isolate}
.coverHero:before{content:"";position:absolute;inset:0;background:
  radial-gradient(circle at 72% 34%,rgba(255,255,255,.08),transparent 30%),
  linear-gradient(90deg,rgba(2,3,8,.94) 0%,rgba(2,3,8,.68) 34%,rgba(2,3,8,.18) 68%,rgba(2,3,8,.58) 100%)}
.coverHero:after{content:"";position:absolute;inset:0;background:
  linear-gradient(0deg,rgba(0,0,0,.9),transparent 34%,rgba(0,0,0,.22)),
  repeating-linear-gradient(0deg,rgba(255,255,255,.035) 0 1px,transparent 1px 4px);pointer-events:none;mix-blend-mode:screen;opacity:.75}
.coverMenu{position:relative;z-index:2;min-height:100%;display:flex;align-items:center;padding:clamp(24px,5.5vw,76px);max-width:560px}
.coverKicker{font-size:11px;color:#77e7ff;letter-spacing:5px;font-weight:bold;text-shadow:2px 2px 0 #000;margin-bottom:12px}
.coverTitle{font-size:clamp(48px,9vw,96px);line-height:.9;color:#fff;text-shadow:0 0 16px rgba(84,216,255,.85),5px 5px 0 #000;font-weight:bold;letter-spacing:0}
.coverTitle b{color:#ffd23f;text-shadow:0 0 14px rgba(255,210,63,.9),5px 5px 0 #000}
.coverSub{font-size:13px;color:#d9f6ff;line-height:1.6;margin:15px 0 20px;text-shadow:2px 2px 0 #000;max-width:430px}
.coverActions{display:grid;gap:14px;width:min(760px,92vw);max-width:760px}
.modeTile{--accent:#2d9cff;--accent2:#0a3457;position:relative;display:grid;grid-template-columns:minmax(0,1fr) minmax(196px,260px);
  align-items:stretch;min-height:112px;padding:0;color:#fff;filter:drop-shadow(0 18px 22px rgba(0,0,0,.48))}
.modeTile:before{content:"";position:absolute;inset:0;clip-path:polygon(0 0,100% 0,95% 50%,100% 100%,0 100%,3% 50%);
  background:linear-gradient(90deg,rgba(4,9,18,.86),rgba(4,9,18,.58));border:1px solid rgba(255,255,255,.08)}
.modeTile:after{content:"";position:absolute;inset:2px;clip-path:polygon(0 0,100% 0,94.5% 50%,100% 100%,0 100%,3.2% 50%);
  border:2px solid var(--accent);opacity:.72;box-shadow:inset 0 0 26px color-mix(in srgb,var(--accent) 35%,transparent)}
.modeTile.primary{--accent:#ff353d;--accent2:#651313}
.modeTile.primary:before{background:linear-gradient(90deg,rgba(42,7,8,.9),rgba(7,8,15,.66))}
.modeCopy{position:relative;z-index:2;padding:18px 18px 16px 28px;display:flex;flex-direction:column;justify-content:center}
.modeEyebrow{font-size:15px;color:var(--accent);letter-spacing:2px;font-weight:bold;text-shadow:2px 2px 0 #000;margin-bottom:5px}
.modeName{font-size:38px;color:#f5f7fb;font-weight:bold;text-shadow:3px 3px 0 #000,0 0 10px rgba(255,255,255,.35);letter-spacing:1px;line-height:1}
.modeTile.primary .modeName{color:#fff}
.modeName em{font-style:italic;color:var(--accent);font-size:.82em;margin-left:6px}
.modeDesc{font-size:13px;color:#d9e6f5;text-shadow:1px 1px 0 #000;margin-top:10px;line-height:1.35;letter-spacing:1px}
.modeBtns{position:relative;z-index:2;display:flex;align-items:center;justify-content:flex-end;gap:10px;padding:16px 22px 16px 10px}
.modePlay,.modeInfo{font-family:inherit;font-weight:bold;border:0;cursor:pointer;color:#fff;text-shadow:2px 2px 0 #000}
.modePlay{height:58px;min-width:168px;padding:0 24px;font-size:24px;letter-spacing:2px;clip-path:polygon(14% 0,100% 0,86% 100%,0 100%);
  background:linear-gradient(90deg,rgba(255,255,255,.16),transparent 28%),linear-gradient(135deg,var(--accent),var(--accent2));
  box-shadow:inset 0 0 0 2px rgba(255,255,255,.12),0 0 18px color-mix(in srgb,var(--accent) 50%,transparent)}
.modePlay small{display:block;font-size:10px;color:rgba(255,255,255,.55);letter-spacing:2px;margin-bottom:2px;font-style:italic}
.modeInfo{position:absolute;right:8px;top:8px;width:28px;height:28px;border-radius:50%;font-size:12px;background:rgba(0,0,0,.55);border:1px solid color-mix(in srgb,var(--accent) 65%,white 10%);color:#dff3ff}
.modePlay:active,.modeInfo:active{transform:translateY(2px)}
.coverCredit{position:absolute;z-index:2;right:18px;bottom:14px;font-size:10px;color:#8ea3b8;text-shadow:1px 1px 0 #000;text-align:right}
.coverStar{position:absolute;z-index:2;right:18px;top:max(18px,env(safe-area-inset-top));font-size:10px;color:#e6f6ff;text-shadow:1px 1px 0 #000;background:rgba(0,0,0,.28);border-left:2px solid rgba(255,210,63,.65);padding:6px 0 6px 10px;text-align:right;letter-spacing:1px}
.coverStar b{color:#ffd23f}
h1.title{font-size:34px;color:#ffd23f;text-shadow:4px 4px 0 #7a4a00,6px 6px 0 #000;letter-spacing:2px;line-height:1.2}
h2.sub{font-size:13px;color:#8fd0ff;margin-top:8px;text-shadow:2px 2px 0 #000;letter-spacing:3px}
.btn{display:inline-block;margin:7px 5px;padding:13px 20px;font-family:inherit;font-weight:bold;font-size:15px;
  color:#fff;background:linear-gradient(#7d7d8f,#5a5a6c 45%,#46465a);border:3px solid #000;cursor:pointer;
  box-shadow:inset 2px 2px 0 rgba(255,255,255,.35),inset -3px -4px 0 rgba(0,0,0,.45),0 4px 0 #000;
  text-shadow:2px 2px 0 #000;letter-spacing:1px}
.btn:active{transform:translateY(3px);box-shadow:inset 2px 2px 0 rgba(255,255,255,.2),0 1px 0 #000}
.btn.gold{background:linear-gradient(#ffd23f,#e8a51e 45%,#b97a10)}
.btn.green{background:linear-gradient(#79e06a,#3fa337 45%,#2c7a26)}
.btn.red{background:linear-gradient(#ff7b6b,#d63b2e 45%,#9c2419)}
.btn.sm{font-size:12px;padding:9px 14px}
.note{font-size:11px;color:#aab;line-height:1.8;margin-top:10px;text-shadow:1px 1px 0 #000}
.card{background:#23232e;border:3px solid #000;box-shadow:0 0 0 2px #44445a;margin:8px 0;padding:10px 12px;text-align:left;font-size:13px;line-height:1.7}
.card b{color:#ffd23f}
.bar{height:10px;background:#0d0d14;border:2px solid #000;margin-top:4px;position:relative}
.bar i{position:absolute;left:0;top:0;bottom:0;background:#4aa3ff;width:0%}
table.std{width:100%;border-collapse:collapse;font-size:14px;margin-top:8px}
table.std td{border:2px solid #000;background:#23232e;padding:8px 6px;font-weight:bold}
table.std tr.me td{background:#2b3a26;color:#9dff8d}
table.std tr.adv td{box-shadow:inset 0 0 0 2px #ffd23f}
.flame{color:#ff7b1c}
#ovBox::-webkit-scrollbar{width:6px}#ovBox::-webkit-scrollbar-thumb{background:#555}
@media (max-width:820px){.coverHero{background-position:62% center}.coverMenu{align-items:flex-end;padding:20px}.coverTitle{font-size:48px}.coverSub{font-size:12px;max-width:330px}.coverStar{left:18px;right:auto;text-align:left;border-left:0;border-right:2px solid rgba(255,210,63,.65);padding:6px 10px 6px 0}.coverCredit{display:none}.coverActions{width:100%;gap:10px}.modeTile{grid-template-columns:minmax(0,1fr) 148px;min-height:96px}.modeCopy{padding:14px 8px 14px 20px}.modeName{font-size:28px}.modeDesc{font-size:11px}.modeBtns{justify-content:flex-end;padding:12px 12px 12px 0}.modePlay{height:48px;min-width:126px;font-size:17px;letter-spacing:1px;padding:0 14px}.modePlay small{font-size:8px}.modeInfo{right:4px;top:4px}}
@media (max-height:480px){h1.title{font-size:26px}#ovBox{padding:12px}#ov.cover-menu #ovBox{padding:0}.coverMenu{align-items:center}.coverTitle{font-size:40px}.coverSub{display:none}.coverStar,.coverCredit{display:none}.modeTile{min-height:76px}.modeDesc{display:none}.modeName{font-size:24px}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="vig"></div><div id="scan"></div>

<div id="hud">
  <div id="hudRound" class="px"></div>
  <div id="hudTimer">70.0</div>
  <div id="hudScore"><div class="big" id="scoreNum">0</div><div class="sm">得分 PTS</div></div>
  <div id="hudRack"><div id="hudRackName"></div><div id="hudDots"></div></div>
  <div id="hudStreak">🔥 x0</div>
  <div id="powerWrap"><div id="pZone"><div id="pTag">甜区</div></div><div id="pSweet"></div><div id="pFill"></div></div>
  <div id="tiltWrap"><span id="tiltLbl">⟺ 保持水平</span><div id="tiltCenter"></div><div id="tiltDot"></div></div>
  <div id="battleControls">
    <div id="battleSpotName">弧顶<br><span id="battleOppScore">对手 0/100</span></div>
  </div>
  <div id="battleScore">
    <span id="bsMe"><b id="bsMeName">你</b> <span id="bsMeNum">0</span></span>
    <span id="bsVS">VS</span>
    <span id="bsOpp"><span id="bsOppNum">0</span> <b id="bsOppName">对手</b></span>
    <div id="bsRace"><i id="bsRaceMe"></i><i id="bsRaceOpp"></i></div>
  </div>
  <button id="midBtn" onpointerdown="event.stopPropagation();event.preventDefault();battleSetSpot(7)" onclick="event.stopPropagation();event.preventDefault()">🔥 中场10分</button>
  <div id="edgeArrows"></div>

const SPK={voice:null,last:0};
const EMO={
  pa:   {pitch:0.82,rate:1.02,jit:0.05,pre:[]},
  hype: {pitch:1.42,rate:1.28,jit:0.2, pre:["哇哦!!","好球——!!","不可思议!!"]},

};
function initVoice(){
  if(!window.speechSynthesis)return;
  const pick=()=>{
    const vs=speechSynthesis.getVoices();
    SPK.voice=vs.find(v=>/zh[-_]CN/i.test(v.lang))||vs.find(v=>/zh/i.test(v.lang))||null;
  };
  pick();speechSynthesis.onvoiceschanged=pick;
}
function say(txt,opt){
  try{
    if(!window.speechSynthesis||MUTED)return;
    opt=opt||{};
    const now=Date.now();
    if(!opt.pri&&now-SPK.last<2600)return;
    SPK.last=now;
    if(opt.pri)speechSynthesis.cancel();
    if(opt.pri||opt.emo==="pa"||opt.emo==="hype")duckBroadcast(opt.pri?2200:1400);
    const e=EMO[opt.emo]||{pitch:opt.pitch||1,rate:opt.rate||1.08,jit:0.06,pre:[]};
    let full=txt;
    if(e.pre.length&&Math.random()<0.65)full=e.pre[(Math.random()*e.pre.length)|0]+full;
    // 按标点切段,每段音高微抖,模拟语气起伏
    const parts=full.split(/(?<=[,。!?!?…—])/).filter(s=>s.trim());
    parts.forEach((p,i)=>{
      const u=new SpeechSynthesisUtterance(p);
      if(SPK.voice)u.voice=SPK.voice;
      u.lang="zh-CN";u.volume=1;
      const basePitch=opt.pitch!=null?opt.pitch:e.pitch;
      const baseRate=opt.rate!=null?opt.rate:e.rate;
      u.pitch=Math.max(0.1,Math.min(2,basePitch+(Math.random()*2-1)*e.jit+(i===parts.length-1?-0.08:0.04)));
      u.rate=Math.max(0.5,Math.min(2,baseRate*(p.includes("!")||p.includes("!")?1.08:1)));
      speechSynthesis.speak(u);
    });
  }catch(e2){}
}

/* ---------------- pixel texture helpers ---------------- */
function pixTex(w,h,draw){
  const cv=document.createElement("canvas");cv.width=w;cv.height=h;
  draw(cv.getContext("2d"),w,h);
  const t=new THREE.CanvasTexture(cv);
  t.magFilter=THREE.NearestFilter;t.minFilter=THREE.NearestFilter;
  return t;
}
function realBallTex(base,dark){
  // 真实篮球:赤道线 + 两条经线 + 两条侧弧沟槽 + 颗粒皮纹
  return pixTex(64,64,(g)=>{
    g.fillStyle=base;g.fillRect(0,0,64,64);
    g.globalAlpha=0.28;g.fillStyle=dark;
    for(let i=0;i<260;i++)g.fillRect((Math.random()*64)|0,(Math.random()*64)|0,1,1);
    g.globalAlpha=1;g.fillStyle="#1f130a";
    g.fillRect(0,31,64,2);            // 赤道沟
    g.fillRect(15,0,2,64);            // 经线 1
    g.fillRect(47,0,2,64);            // 经线 2
    for(let x=0;x<64;x++){            // 两条倾斜大圆 → 侧弧沟槽
      const y1=32+13*Math.sin((x/64)*Math.PI*2);
      const y2=32+13*Math.sin((x/64)*Math.PI*2+Math.PI);
      g.fillRect(x,(y1|0)-1,1,2);
      g.fillRect(x,(y2|0)-1,1,2);
    }
  });
}
function triBallTex(){
  // 街球红白蓝三色球 (ABA 风格 6 瓣)
  const cols=["#1f4fd8","#f2f2f2","#d8262e"];
  return pixTex(66,64,(g)=>{
    for(let s=0;s<6;s++){
      g.fillStyle=cols[s%3];
      g.fillRect(s*11,0,11,64);
      g.fillStyle="#15100c";g.fillRect(s*11,0,1,64); // 瓣缝
    }
    g.globalAlpha=0.18;g.fillStyle="#000";
    for(let i=0;i<200;i++)g.fillRect((Math.random()*66)|0,(Math.random()*64)|0,1,1);
    g.globalAlpha=1;g.fillStyle="#15100c";
    g.fillRect(0,31,66,2);            // 赤道沟
  });
}

/* ---------------- arena ---------------- */
function buildCourt(){
  const PXM=32, W=32, D=26; // meters
  const tex=pixTex(W*PXM,D*PXM,(g)=>{
    const u=x=>(x+16)*PXM, v=z=>(z+16)*PXM; // z -16..10
    // parquet 1m blocks
    for(let x=0;x<W;x++)for(let z=0;z<D;z++){
      const odd=(x+z)%2===0;
      g.fillStyle=odd?"#a4763f":"#8f6432";
      g.fillRect(x*PXM,z*PXM,PXM,PXM);
      g.fillStyle="rgba(0,0,0,.12)";
      if(Math.random()<.5)g.fillRect(x*PXM,z*PXM,PXM,4);
      g.fillStyle="rgba(255,255,255,.05)";g.fillRect(x*PXM,z*PXM,4,PXM);
    }
    // out of bounds apron
    g.fillStyle="rgba(30,55,110,.55)";
    g.fillRect(0,0,u(-7.9),D*PXM); g.fillRect(u(7.9),0,W*PXM,D*PXM);
    g.fillRect(0,0,W*PXM,v(-9.9)); g.fillRect(0,v(9.58),W*PXM,D*PXM);
    g.lineWidth=6;g.strokeStyle="#f2f2f2";
    // boundary
    g.strokeRect(u(-7.62),v(-9.58),(15.24)*PXM,(19.16)*PXM);
    // full-court center line and circle
    g.strokeStyle="rgba(242,242,242,.8)";g.lineWidth=5;g.lineCap="round";
    g.beginPath();g.moveTo(u(-7.62),v(0));g.lineTo(u(7.62),v(0));g.stroke();
    g.beginPath();g.arc(u(0),v(0),1.8*PXM,0,Math.PI*2);g.stroke();
    // key
    g.strokeRect(u(-2.45),v(-9.58),4.9*PXM,5.79*PXM);
    g.beginPath();g.arc(u(0),v(-3.79),1.8*PXM,0,Math.PI*2);g.stroke();
    // 3pt line (暗白色,完整弧线)
    g.strokeStyle="#d8dde2";g.lineWidth=7;g.lineCap="round";
    const arcR=7.24, cx=0, cz=-8;
    // 弧线与底线两侧直线相切:直线在 x=±6.71,延伸到弧线
    const sideX=6.71;
    // 求弧线在 x=±sideX 处的 z(取靠近shooter的解): z = cz + sqrt(r²-sideX²)
    const zJoin=cz+Math.sqrt(arcR*arcR-sideX*sideX);
    // 左右直线段:底线(-9.58) 到 zJoin
    g.beginPath();g.moveTo(u(-sideX),v(-9.58));g.lineTo(u(-sideX),v(zJoin));g.stroke();
    g.beginPath();g.moveTo(u(sideX),v(-9.58));g.lineTo(u(sideX),v(zJoin));g.stroke();
    // 顶弧:用线段拼,从左切点扫到右切点(经过shooter侧最高点 z=cz+r)
    const aL=Math.atan2(zJoin-cz,-sideX), aR=Math.atan2(zJoin-cz,sideX);
    g.beginPath();
    const N=64;
    for(let i=0;i<=N;i++){
      const a=aL+(aR-aL)*(i/N);
      const px=cx+Math.cos(a)*arcR, pz=cz+Math.sin(a)*arcR;
      if(i===0)g.moveTo(u(px),v(pz));else g.lineTo(u(px),v(pz));
    }
    g.stroke();
    // far half markings, kept non-playable but visible so the venue reads as a full court
    g.strokeStyle="rgba(216,221,226,.62)";g.lineWidth=5;g.lineCap="round";
    g.strokeRect(u(-2.45),v(3.79),4.9*PXM,5.79*PXM);
    g.beginPath();g.arc(u(0),v(3.79),1.8*PXM,0,Math.PI*2);g.stroke();
    const farCz=8, farJoin=farCz-Math.sqrt(arcR*arcR-sideX*sideX);
    g.beginPath();g.moveTo(u(-sideX),v(9.58));g.lineTo(u(-sideX),v(farJoin));g.stroke();
    g.beginPath();g.moveTo(u(sideX),v(9.58));g.lineTo(u(sideX),v(farJoin));g.stroke();
    const faL=Math.atan2(farJoin-farCz,-sideX), faR=Math.atan2(farJoin-farCz,sideX);
    g.beginPath();
    for(let i=0;i<=N;i++){
      const a=faL+(faR-faL)*(i/N);
      const px=cx+Math.cos(a)*arcR, pz=farCz+Math.sin(a)*arcR;
      if(i===0)g.moveTo(u(px),v(pz));else g.lineTo(u(px),v(pz));
    }
    g.stroke();
    // ---- 投篮点位:统一风格的地面小标记,低饱和、融入木地板 ----
    function spotDecal(x,z,r,fill,line,lw,txt,txtCol,fs){
      g.fillStyle=fill;g.beginPath();g.arc(u(x),v(z),r*PXM,0,7);g.fill();
      if(line){g.strokeStyle=line;g.lineWidth=lw;g.beginPath();g.arc(u(x),v(z),r*PXM,0,7);g.stroke();}
      if(txt){g.fillStyle=txtCol;g.font="bold "+fs+"px monospace";g.textAlign="center";g.fillText(txt,u(x),v(z)+fs*0.36);}
    }
    // 5 个常规三分点:仅一圈淡淡的脚位环,不带数字
    for(const rk of RACKS){
      spotDecal(rk.p.x,rk.p.z,0.42,"rgba(124,252,107,0.06)","rgba(150,230,140,0.42)",3,null);
    }
    // 2 个深远点:淡蓝环 + 小号 3
    for(const dp of DEEPS){
      spotDecal(dp.p.x,dp.p.z,0.46,"rgba(80,190,255,0.07)","rgba(120,205,255,0.45)",3,"3","rgba(190,235,255,0.55)",16);
    }
    // 中场 10 分点:淡金环 + 小号 10
    spotDecal(HALFCOURT.p.x,HALFCOURT.p.z,0.58,"rgba(255,210,63,0.08)","rgba(255,210,63,0.5)",3,"10","rgba(255,225,130,0.7)",18);
    // center logo
    g.fillStyle="#1d428a";g.beginPath();g.arc(u(0),v(0),2.1*PXM,0,7);g.fill();
    g.fillStyle="#ffd23f";g.font="bold 40px monospace";g.textAlign="center";
    g.fillText("aiBA",u(0),v(-0.15));
    g.font="bold 24px monospace";g.fillText("★ RACE 100 ★",u(0),v(0.8));
  });
  const floor=new THREE.Mesh(new THREE.PlaneGeometry(W,D),new THREE.MeshLambertMaterial({map:tex}));
  floor.rotation.x=-Math.PI/2; floor.position.set(0,0,-3); scene.add(floor);
  // 当前点位高亮:平铺在地板上的发光圆环(用圆形几何+画布贴图,兼容性最好),随站位移动并轻微脉动
  const ringTex=pixTex(128,128,(g)=>{
    g.clearRect(0,0,128,128);
    g.strokeStyle="#fff";g.lineWidth=11;g.beginPath();g.arc(64,64,50,0,Math.PI*2);g.stroke();
    g.globalAlpha=0.45;g.lineWidth=4;g.beginPath();g.arc(64,64,38,0,Math.PI*2);g.stroke();
  });
  ringTex.magFilter=THREE.LinearFilter;ringTex.minFilter=THREE.LinearFilter;
  curSpotRing=new THREE.Mesh(new THREE.CircleGeometry(0.7,40),
    new THREE.MeshBasicMaterial({map:ringTex,color:0xffd23f,transparent:true,opacity:0.55,side:THREE.DoubleSide,depthWrite:false}));
  curSpotRing.rotation.x=-Math.PI/2;curSpotRing.position.y=0.03;curSpotRing.visible=false;scene.add(curSpotRing);
}
function bannerTex(txt,bg,fg){
  return pixTex(512,96,(g)=>{
    g.fillStyle=bg;g.fillRect(0,0,512,96);
    g.fillStyle="rgba(255,255,255,.06)";
    for(let i=0;i<512;i+=16)g.fillRect(i,0,8,96);
    g.fillStyle=fg;g.font="bold 44px monospace";g.textAlign="center";g.textBaseline="middle";
    g.fillText(txt,256,50);
  });
}
function buildStands(){
  const stepGeo=new THREE.BoxGeometry(1,1,1);
  const stepMat=new THREE.MeshLambertMaterial({color:0x2b2b38});
  const seats=[];
  function side(cx,cz,len,axis,inward,rows){
    for(let r=0;r<rows;r++){
      const off=(r*1.25+0.6);
      const m=new THREE.Mesh(stepGeo,stepMat);
      const h=0.85*(r+1);
      if(axis==="x"){m.scale.set(len,h,1.25);m.position.set(cx,h/2,cz-inward*off);}
      else{m.scale.set(1.25,h,len);m.position.set(cx-inward*off,h/2,cz);}
      scene.add(m);
      const n=Math.floor(len/1.15);
      for(let s=0;s<n;s++){
        if(Math.random()<0.1)continue;
        const t=-len/2+0.6+s*1.15+rnd(-0.1,0.1);
        const px=axis==="x"?cx+t:cx-inward*off;
        const pz=axis==="x"?cz-inward*off:cz+t;
        seats.push({x:px,y:h+0.42,z:pz,ph:Math.random()*7,amp:rnd(.7,1.3)});
      }
    }
  }
  side(0,-11.6,26,"x",1,5);      // behind hoop
  side(0, 7.0,26,"x",-1,4);      // behind shooter
  side(-13.4,-3,17,"z",1,5);     // left
  side(13.4,-3,17,"z",-1,5);     // right
  // banner walls
  const banners=[["aiBA PERCENT BATTLE","#13213f","#ffd23f"],["MINE-DEW 深远三分区","#0c3a14","#9dff8d"],["像素之夜 PIXEL NIGHT","#3a1240","#ff9df1"]];
  const wallDefs=[[0,3.6,-19,0],[ -19.5,3.6,-3,Math.PI/2],[19.5,3.6,-3,-Math.PI/2],[0,3.6,13.5,Math.PI]];
  wallDefs.forEach((w,i)=>{
    const b=banners[i%banners.length];
    const m=new THREE.Mesh(new THREE.PlaneGeometry(26,4),
      new THREE.MeshBasicMaterial({map:bannerTex(b[0],b[1],b[2])}));
    m.position.set(w[0],w[1]+4.5,w[2]);m.rotation.y=w[3];scene.add(m);
  });
  return seats;
}

function updBackcourtShow(t){
  showCrew.forEach((c,i)=>{
    const s=Math.sin(t*5+c.phase), c2=Math.cos(t*4.2+c.phase);
    if(c.type==="mascot"){
      c.g.position.y=Math.max(0,s)*0.08;
      c.g.rotation.y=-0.55+Math.sin(t*2+c.phase)*0.08;
      c.arms[0].rotation.z=0.5+Math.sin(t*4+c.phase)*0.35;
      c.arms[1].rotation.z=-0.9+Math.sin(t*5+c.phase)*0.45;
    }else{
      c.g.position.y=Math.max(0,s)*0.05;
      c.g.rotation.y+=(c2*0.0015);
      c.arms[0].rotation.z=-0.75+s*0.55;
      c.arms[1].rotation.z=0.75-s*0.55;
      c.poms[0].position.y=1.24+Math.max(0,s)*0.18;
      c.poms[1].position.y=1.24+Math.max(0,-s)*0.18;
    }
  });
}
/* crowd: grouped instanced meshes (no per-instance color needed) */
const crowd={groups:[],dummy:new THREE.Object3D()};
function buildCrowd(seats){
  const bodyCols=[0x1d428a,0xffc72c,0xce1141,0xf5f5f5,0x007a33,0xe56020];
  const headCols=[0xf4c89c,0xd9a066,0x8d5524];
  const bodyGeo=new THREE.BoxGeometry(0.55,0.75,0.4);
  const headGeo=new THREE.BoxGeometry(0.38,0.38,0.38);
  const buckets=bodyCols.map(()=>[]);
  seats.forEach(s=>buckets[(Math.random()*bodyCols.length)|0].push(s));
  buckets.forEach((arr,i)=>{
    if(!arr.length)return;
    const body=new THREE.InstancedMesh(bodyGeo,new THREE.MeshLambertMaterial({color:bodyCols[i]}),arr.length);
    const head=new THREE.InstancedMesh(headGeo,new THREE.MeshLambertMaterial({color:headCols[i%3]}),arr.length);
    scene.add(body);scene.add(head);
    crowd.groups.push({body,head,seats:arr});
  });
}
function updCrowd(t){
  const d=crowd.dummy;
  for(const g of crowd.groups){
    for(let i=0;i<g.seats.length;i++){
      const s=g.seats[i];
      const jump=Math.max(0,Math.sin(t*9+s.ph))*0.4*G.cheer*s.amp;
      const sway=Math.sin(t*1.4+s.ph)*0.035;
      d.position.set(s.x,s.y+jump+sway,s.z);
      d.rotation.y=Math.sin(s.ph)*0.4;
      d.updateMatrix();g.body.setMatrixAt(i,d.matrix);
      d.position.y+=0.58;d.updateMatrix();g.head.setMatrixAt(i,d.matrix);
    }
    g.body.instanceMatrix.needsUpdate=true;
    g.head.instanceMatrix.needsUpdate=true;
  }
}

    seg.position.set(HOOP.x+Math.cos(a)*0.3,HOOP.y,HOOP.z+Math.sin(a)*0.3);

  // net
  netMesh=new THREE.Mesh(

/* 发型:清空 hairGrp 重建,所有发块共享 hairMat */
function setHair(o,style,colorHex){
  if(colorHex!=null)o.hairMat.color.setHex(colorHex);
  const G=o.hairGrp,m=o.hairMat;
  while(G.children.length)G.remove(G.children[0]);
  o.hairStyle=style;
  const box=(w,h,d,x,y,z)=>{const b=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m);b.position.set(x,y,z);G.add(b);};

  if(style==="cornrows"){
    for(let i=-2;i<=2;i++)box(0.05,0.10,0.40,i*0.075,1.83,0);
    box(0.37,0.08,0.12,0,1.82,-0.17);return;
  }
  if(style==="flattop"){box(0.355,0.18,0.355,0,1.88,0);box(0.37,0.10,0.12,0,1.80,-0.165);return;}
  // 默认 short / fade
  box(0.355,0.10,0.36,0,1.83,0);            // 顶
  box(0.37,0.075,0.16,0,1.80,-0.17);        // 后脑

/* 胡子:首次开启时构建,之后只切显隐 */

function faceTex(skinHex){

    g.fillStyle=c;g.fillRect(0,0,32,32);
    g.fillStyle="rgba(0,0,0,.07)";g.fillRect(0,23,32,9);     // 下颌轻微暗部
    g.fillStyle="#1b120a";g.fillRect(6,11,7,2);g.fillRect(19,11,7,2);   // 眉
    g.fillStyle="#ffffff";g.fillRect(7,14,7,4);g.fillRect(18,14,7,4);   // 眼白
    g.fillStyle="#241308";g.fillRect(10,14,4,4);g.fillRect(21,14,4,4);  // 瞳
    g.fillStyle="rgba(0,0,0,.15)";g.fillRect(15,18,3,5);    // 鼻
    g.fillStyle="rgba(70,25,12,.7)";g.fillRect(11,26,10,2); // 嘴
  });
}
function jerseyTex(hex,num,big){
  const c="#"+hex.toString(16).padStart(6,"0");

    g.fillStyle=c;g.fillRect(0,0,48,48);
    if(num===""||num==null)return;
    g.font="bold "+(big?28:22)+"px monospace";g.textAlign="center";
    g.lineWidth=3;g.strokeStyle="rgba(0,0,0,.85)";

function dressGuy(o,jersey,shorts,num){

function applyStarStyle(guy,star){

  if(star.sleeve!=null)guy.sleeves.forEach((s,i)=>{s.visible=i===1||star.id==="a03";s.material.color.setHex(star.sleeve);});
  const hc=star.hair!=null?star.hair:0x141414;

function randomizeOutfit(o){
  const pick=a=>a[(Math.random()*a.length)|0];
  const SC=[0xff4040,0xffffff,0x111111,0x00d0ff,0xffd23f,0xff8df0,0x7CFC6B];
  const BC=[0xff4040,0xffffff,0x111111,0xffd23f,0x00d0ff,0x9b59ff];
  const SK=[0xf4c89c,0xd9a878,0x9c6b43,0x6b4a2c];
  const skin=pick(SK);o.mS.color.setHex(skin);
  o.mFace.map=faceTex(skin);o.mFace.color.setHex(0xffffff);o.mFace.needsUpdate=true;
  const sc=pick(SC);o.shoes.forEach(s=>s.material.color.setHex(sc));
  o.headband.visible=Math.random()<0.6;o.headband.material.color.setHex(pick(BC));
  o.wrists.forEach(w=>{w.visible=Math.random()<0.5;w.material.color.setHex(pick(BC));});
  o.sleeves.forEach((s,i)=>{s.visible=(i===1&&Math.random()<0.5)||(i===0&&Math.random()<0.12);
    s.material.color.setHex(pick([0x111111,0xeeeeee,0xce1141,0x1d428a]));});
  const hc=pick([0x222222,0x4a2c12,0x101010,0x5c4a1e,0x3a2410]);
  // 随机不出现光头(光头只留给指定明星如卡特),避免库里等被随机成光头
  const HS=["short","short","fade","fade","buzz","afro","cornrows","flattop"];
  setHair(o, pick(HS), hc);
  setBeard(o, Math.random()<0.3, hc);
}
const BENCH=[V3(-9.3,0,-5),V3(-9.3,0,-2.5),V3(-9.3,0,0)];

function rivalFor(o){const i=G.opponents.indexOf(o);return rivals[i>=0?i:0];}
function benchSetup(){
  rivals.forEach((rv,i)=>{
    const o=G.stage==="final"?(i===0?G.finalist:null):G.opponents[i];
    rv.active=!!o;rv.o=o;
    if(!o)return;

/* 自适应取景:用球员全身+篮筐/篮板包围点反推相机距离,不再为中场写死镜头 */
const _afCenter=new THREE.Vector3(),_afMin=new THREE.Vector3(),_afMax=new THREE.Vector3();
const _afBack=new THREE.Vector3(),_afForward=new THREE.Vector3(),_afRight=new THREE.Vector3(),_afUp=new THREE.Vector3();
const _afTmp=new THREE.Vector3(),_afPts=[];
function afAdd(x,y,z){_afPts.push(V3(x,y,z));}
function autoFrameCam(rig,pPos,pJump,faceDir,opts){
  opts=opts||{};
  _afPts.length=0;
  const dir=_afTmp.set(faceDir.x,0,faceDir.z);
  if(dir.lengthSq()<0.001)dir.set(0,0,-1);
  dir.normalize();
  const perp=V3(dir.z,0,-dir.x);
  // 固定取景侧:始终取球员朝向篮筐时的同一侧,篮筐稳定停在屏幕同一边,不再左右翻转
  const side=opts.side!=null?opts.side:1;
  const shoeY=Math.max(0,pJump);
  const headY=1.9+pJump;
  const bodyW=0.48,bodyD=0.34;
  // 球员全身包围盒:脚、肩、头都纳入,避免竖屏时人物被左右/上下切掉。
  [-1,1].forEach(a=>[-1,1].forEach(b=>{
    const x=pPos.x+perp.x*a*bodyW+dir.x*b*bodyD;
    const z=pPos.z+perp.z*a*bodyW+dir.z*b*bodyD;
    afAdd(x,shoeY,z);afAdd(x,1.18+pJump,z);afAdd(x,headY,z);
  }));
  // 篮筐 + 篮板的大致包围点。篮板比篮筐更宽更高,必须一起装进画面。
  [-1.12,1.12].forEach(x=>[2.62,3.88].forEach(y=>afAdd(HOOP.x+x,y,HOOP.z-0.48)));
  [-0.46,0.46].forEach(x=>[-0.18,0.18].forEach(z=>afAdd(HOOP.x+x,HOOP.y,HOOP.z+z)));
  _afMin.set(Infinity,Infinity,Infinity);_afMax.set(-Infinity,-Infinity,-Infinity);
  _afPts.forEach(p=>{_afMin.min(p);_afMax.max(p);});
  _afCenter.addVectors(_afMin,_afMax).multiplyScalar(0.5);
  _afCenter.y+=opts.lookLift||0.08;
  // 从球员侧后方斜看,但距离由视锥计算得出。转播视角略高、略侧。
  const sideK=opts.broadcast?0.72:0.52;
  const backK=opts.broadcast?0.58:0.74;
  const heightK=opts.broadcast?0.42:0.34;
  _afBack.set(-dir.x*backK+perp.x*side*sideK,heightK,-dir.z*backK+perp.z*side*sideK).normalize();
  _afForward.copy(_afBack).negate();
  _afRight.crossVectors(_afForward,V3(0,1,0)).normalize();
  _afUp.crossVectors(_afRight,_afForward).normalize();
  const vFov=camera.fov*Math.PI/180;
  const aspect=camera.aspect||(innerWidth/innerHeight)||1;
  const hFov=2*Math.atan(Math.tan(vFov/2)*aspect);
  const tanH=Math.tan(hFov/2),tanV=Math.tan(vFov/2);
  const marginX=opts.marginX||1.44,marginY=opts.marginY||1.34;
  let dist=0;
  _afPts.forEach(p=>{
    _afTmp.copy(p).sub(_afCenter);
    const x=_afTmp.dot(_afRight),y=_afTmp.dot(_afUp),z=_afTmp.dot(_afForward);
    dist=Math.max(dist,Math.abs(x)*marginX/tanH-z,Math.abs(y)*marginY/tanV-z);
  });
  dist=clamp(dist+0.85,opts.minDist||5.2,opts.maxDist||30);
  rig.pos.copy(_afCenter).addScaledVector(_afBack,dist);
  rig.look.copy(_afCenter);
}

/* shooting pose driven by charge phase: 下蹲→举球(屈肘)→起跳伸展→顶点出手=完美 */
let poseK=0,landT=0;
function ease01(t){
  t=clamp(t,0,1);
  return t*t*(3-2*t);
}
function shotCurves(ph){
  const loadIn=ease01(ph/0.32);
  const rise=ease01((ph-0.58)/0.28);
  return {
    dip:loadIn*(1-rise),
    lift:ease01((ph-0.28)/0.48),
    rise,
    jmp:ease01((ph-0.76)/0.22),
    over:Math.max(0,ph-1)
  };
}
function poseFootBottomY(hip,knee,ankle){
  const a1=hip,a2=hip+knee,a3=hip+knee+ankle;
  return 0.78
    -0.34*Math.cos(a1)
    -0.32*Math.cos(a2)
    -0.04*Math.cos(a3)
    -0.05*Math.sin(a3)
    -0.065*Math.abs(Math.cos(a3))
    -0.15*Math.abs(Math.sin(a3));
}
const POSE_STAND_FOOT_Y=poseFootBottomY(0,0,0);
function poseGuy(o,c,lk){
  const sh=o.arms[0],gd=o.arms[1]; // arms[0]=x-0.33=角色右手(面朝篮筐时屏幕右侧) 投篮 / arms[1]=左手 护球
  sh.rotation.x=-0.35-0.25*c.dip-1.55*c.lift-0.9*c.jmp;
  o.elbows[1].rotation.x=-(0.45+1.2*c.lift)*(1-c.jmp*0.92)-0.4*c.over;
  gd.rotation.x=-0.35-0.2*c.dip-1.1*c.lift-0.5*c.jmp+0.55*c.over;
  o.elbows[0].rotation.x=-(0.4+0.85*c.lift)*(1-c.jmp*0.6);
  sh.rotation.z=-0.12*c.lift;gd.rotation.z=0.18*c.lift;
  // Real-shot leg chain: knees load forward, calves fold back into a V, soles stay planted until takeoff.
  const load=c.dip*(1-c.jmp*0.86);
  const land=lk||0;
  const hipBase=-0.48*load-0.24*land+0.06*c.jmp;
  const kneeBase=Math.max(0,0.98*load+0.82*land-0.78*c.jmp);
  const hipLead=hipBase-0.03*load,hipTrail=hipBase+0.03*load;
  const kneeLead=kneeBase*0.96,kneeTrail=kneeBase*1.04;
  const ankleLead=-(hipLead+kneeLead)*0.98-0.18*c.jmp+0.04*land;
  const ankleTrail=-(hipTrail+kneeTrail)*0.98-0.18*c.jmp+0.04*land;
  o.legs[0].rotation.x=hipLead;
  o.legs[1].rotation.x=hipTrail;
  o.knees[0].rotation.x=kneeLead;
  o.knees[1].rotation.x=kneeTrail;
  o.ankles[0].rotation.x=ankleLead;
  o.ankles[1].rotation.x=ankleTrail;
  o.shoes[0].rotation.x=0;
  o.shoes[1].rotation.x=0;
  // 上身前倾:蓄力约10°(0.17rad),起跳回正并略后仰送球
  o.g.rotation.x=0.12*load - 0.06*c.over - 0.03*c.jmp + 0.08*land;
  const footY=(poseFootBottomY(hipLead,kneeLead,ankleLead)+poseFootBottomY(hipTrail,kneeTrail,ankleTrail))*0.5;
  return POSE_STAND_FOOT_Y-footY;
}
function poseBallPos(v,c){
  v.set(-0.13+0.04*c.jmp,
    0.82+0.23*(1-c.dip)+0.7*c.lift+0.52*c.jmp,
    0.34-0.05*c.lift-0.18*c.jmp);
  return v;
}
function updPose(dt){
  const s=curShot();
  const ideal=s?shotIdeal(s):IDEAL;
  poseK=G.charging?G.power/ideal:Math.max(0,poseK-dt*4.5);
  const c=shotCurves(poseK);
  // apex cue: tiny vibration + faint tick at the top of the jump
  if(G.charging&&!G.apexed&&poseK>=1){
    G.apexed=true;
    if(navigator.vibrate)navigator.vibrate(12);
    blip(960,0.03,"square",0.045);
  }
  if(landT>0)landT-=dt;
  const lk=landT>0?Math.sin((0.3-landT)/0.3*Math.PI):0;
  P.jump=Math.max(-0.06,c.jmp*0.55-c.over*0.55);
  P.eyeDip=-0.26*c.dip-0.09*lk;
  // first-person: right-hand shot pocket, ball rises past the face to overhead
  hands.position.x=-0.05*c.lift;
  hands.position.y=-0.5-0.2*c.dip+0.3*c.lift+0.42*c.jmp;
  hands.position.z=-0.62+0.12*c.dip-0.17*c.jmp;
  hands.rotation.x=-0.25*c.lift-0.85*c.jmp+c.over*1.1;
  hands.rotation.z=-0.07*c.lift;
  // avatar
  player.g.position.set(P.pos.x,0,P.pos.z);
  player.g.rotation.y=P.face;
  if(P.walking){
    P.walkT+=dt*9;
    const sw=Math.sin(P.walkT);
    player.g.rotation.x=0;
    player.legs[0].rotation.x=sw*0.7;player.legs[1].rotation.x=-sw*0.7;
    player.knees[0].rotation.x=Math.max(0,-sw*0.5+0.25);player.knees[1].rotation.x=Math.max(0,sw*0.5+0.25);
    player.ankles[0].rotation.x=-sw*0.25;player.ankles[1].rotation.x=sw*0.25;
    player.shoes[0].rotation.x=0;player.shoes[1].rotation.x=0;
    player.arms[0].rotation.x=-sw*0.45;player.arms[1].rotation.x=sw*0.45;
    player.elbows[0].rotation.x=-0.4;player.elbows[1].rotation.x=-0.4;
  }else{
    player.g.position.y=poseGuy(player,c,lk)+P.jump;
  }
  poseBallPos(pBall.position,c);
}

function updWalk(dt){

  let d=tgt-P.face;while(d>Math.PI)d-=2*Math.PI;while(d<-Math.PI)d+=2*Math.PI;
  P.face+=d*Math.min(1,dt*8);

function genAIRun(o){
  const p=aiProb(o.r),money=(seededRandom()*5)|0;

  for(let rk=0;rk<5;rk++){

      shots.push({rack:rk,deep:null,money:m,val:v,make});
      if(make)total+=v;
    }
    if(rk===1||rk===2){
      const mk=seededRandom()<p*0.82;
      shots.push({rack:null,deep:rk===1?0:1,money:false,val:3,make:mk});
      if(mk)total+=3;
    }
  }

}

    g.ankles[0].rotation.x=-sw*0.22;g.ankles[1].rotation.x=sw*0.22;g.g.rotation.x=0;
    if(k>=1){g.legs[0].rotation.x=0;g.legs[1].rotation.x=0;g.knees[0].rotation.x=0;g.knees[1].rotation.x=0;g.ankles[0].rotation.x=0;g.ankles[1].rotation.x=0;nextShowItem();}
  }else if(it.type==="shot"){

    const c=shotCurves(ph);show.c=c;
    const y=poseGuy(g,c,0)+Math.max(0,c.jmp*0.55-c.over*0.55);
    g.g.position.set(g.pos.x,y,g.pos.z);
    poseBallPos(g.ball.position,c);
    if(ph>=1.03&&!it.fired){

function fireSilentBall(base,s){
  const dirH=HOOP.clone().sub(base);dirH.y=0;const dist=dirH.length();dirH.normalize();
  const p0=base.clone().addScaledVector(dirH,-0.1);p0.y=2.05;
  const perp=V3(dirH.z,0,-dirH.x);
  let depth,lat;
  if(s.make){depth=rnd(-0.03,0.03);lat=rnd(-0.04,0.04);}
  else{depth=0.27*(Math.random()<0.5?1:-1);lat=rnd(-0.14,0.14);}
  const T=HOOP.clone().addScaledVector(dirH,depth).addScaledVector(perp,lat);
  const tf=0.78+dist*0.062;
  const v0=V3((T.x-p0.x)/tf,(T.y-p0.y)/tf+4.9*tf,(T.z-p0.z)/tf);
  const mesh=new THREE.Mesh(ballGeo,s.deep!=null?matDeep:(s.money?matGold:matBall));
  mesh.position.copy(p0);scene.add(mesh);
  const blob=new THREE.Mesh(blobGeo,blobMat.clone());
  blob.rotation.x=-Math.PI/2;blob.position.set(p0.x,0.02,p0.z);scene.add(blob);
  balls.push({mesh,blob,p0:p0.clone(),v0,tf,t:0,phase:"fly",outcome:s.make?"swish":"rimout",
    vel:new THREE.Vector3(),val:s.val,money:s.money,deep:s.deep!=null,made:false,life:1.4,bounces:0,
    rec:[],timeLeft:0,hot:false,startPos:p0.clone(),silent:true});
}

function checkBattleOvertake(prevMe,prevOpp){
  if(G.battleCut||G.battleOver)return;
  if(Math.max(G.score,G.battleOppScore)<CUTAWAY_MIN_SCORE)return;
  // 你反超:之前没领先(落后或平),现在领先
  if(G.score>G.battleOppScore && prevMe<=prevOpp){
    const key=G.score>=BATTLE_TARGET-15||(G.score-prevMe)>=10;
    battleCutaway(true,key);
  }
  // 对手反超:之前没领先(你领先或平),现在他领先
  else if(G.battleOppScore>G.score && prevOpp<=prevMe){
    const key=G.battleOppScore>=BATTLE_TARGET-15||(G.battleOppScore-prevOpp)>=10;
    battleCutaway(false,key);
  }
}
function battleScoreCallout(prevMe,prevOpp){
  if(G.mode!=="battle"||G.battleOver)return;
  if(!G.battleCalls)G.battleCalls={};
  const me=Math.min(G.score,BATTLE_TARGET),op=Math.min(G.battleOppScore||0,BATTLE_TARGET);
  const prevMax=Math.max(prevMe||0,prevOpp||0),nowMax=Math.max(me,op);
  const marks=[20,50,80,90];
  for(const m of marks){
    if(!G.battleCalls[m]&&prevMax<m&&nowMax>=m){
      G.battleCalls[m]=true;
      broadcastSting(m>=80?"danger":"score");
      const lead=me>op?"你暂时领先。":op>me?G.battleOpp.n+"暂时领先。":"双方打平。";
      const tension=m>=90?"九十分关口,下一球都可能改变比赛。":m>=80?"进入最后冲刺阶段。":m>=50?"比赛过半,节奏开始加速。":"第一段比分播报。";
      paSay(tension+"现在"+me+"比"+op+"。"+lead,true);
      toast("比分播报 "+me+" : "+op,"#9fd1ff");
      return;
    }
  }
  if(!G.battleCalls.final5&&prevMax<95&&nowMax>=95){
    G.battleCalls.final5=true;
    broadcastSting("danger");
    paSay("最后五分决胜,"+me+"比"+op+"。一球都不能松。",true);

  }
}

/* ---------------- tween helper ---------------- */
const tweens=[];
const ease=k=>k<0.5?2*k*k:1-Math.pow(-2*k+2,2)/2;
function tween(dur,fn,done){tweens.push({t:0,dur,fn,done});}
function updTweens(dt){
  for(let i=tweens.length-1;i>=0;i--){
    const w=tweens[i];w.t+=dt;
    const k=Math.min(1,w.t/w.dur);w.fn(ease(k));
    if(k>=1){tweens.splice(i,1);if(w.done)w.done();}
  }
}
function glideTo(p,l,dur,cb){
  const p0=rig.pos.clone(),l0=rig.look.clone(),pt=p.clone(),lt=l.clone();
  G.moving=true;G.glideCam=true;
  tween(dur,k=>{
    rig.pos.lerpVectors(p0,pt,k);
    rig.pos.y+=Math.sin(k*Math.PI)*0.35;
    rig.look.lerpVectors(l0,lt,k);
  },()=>{G.moving=false;G.glideCam=false;if(cb)cb();});
}

function releaseShot(power,shot){
  const isBattle=G.mode==="battle";
  const isDeep=shot.deep!=null||shot.super;
  const ideal=shotIdeal(shot);
  const zone=DIFFS[G.diff].zone;
  const err=power-ideal, a=Math.abs(err), r=Math.random();
  // lateral error = device tilt + hand noise
  const tl=tiltDeg()*DIFFS[G.diff].latK;
  const latErr=tl+rnd(-0.035,0.035);
  const al=Math.abs(latErr);
  let outcome;
  if(a<=zone*0.5)outcome="swish";
  else if(a<=zone)outcome=r<0.5?"rattle":(r<0.7?"rattleout":(err>0&&r<0.85?"bank":"rimout"));
  else if(a<=zone*1.8)outcome=r<0.15?"rattle":(r<0.4?"rattleout":(err>0&&r<0.55?"bank":"rimout"));
  else outcome="miss";
  // tilt drags the ball sideways and downgrades the result
  if(outcome!=="miss"){
    if(al>0.3)outcome="miss";
    else if(al>0.2&&outcome!=="rimout")outcome="rimout";
    else if(al>0.12&&outcome==="swish")outcome=r<0.5?"rattle":"rattleout";
    else if(al>0.12&&outcome==="bank")outcome="rattleout";
  }
  // hide rack ball in contest mode; battle mode has infinite balls at each spot.
  if(!isBattle){
    if(shot.deep!=null)deepBalls[shot.deep].visible=false;
    else{const m=rackBalls[shot.rack][shot.ball];if(m)m.visible=false;}
  }
  // spawn from the hands (any camera mode)
  const p0=new THREE.Vector3();ballWorldPos(p0);
  handBall.visible=false;pBall.visible=false;
  const dirH=HOOP.clone().sub(p0);dirH.y=0;const dist=dirH.length();dirH.normalize();
  const perp=V3(dirH.z,0,-dirH.x);
  let depth=0,lat=0;
  if(outcome==="swish"){depth=rnd(-0.03,0.03);lat=clamp(latErr*0.5,-0.06,0.06)+rnd(-0.02,0.02);}
  else if(outcome==="rattle"||outcome==="rattleout"){depth=0.17*Math.sign(err||1);lat=clamp(latErr,-0.12,0.12)+rnd(-0.05,0.05);}
  else if(outcome==="bank"){depth=0.55;lat=clamp(latErr*0.5,-0.1,0.1);}
  else if(outcome==="rimout"){depth=0.27*Math.sign(err||1);lat=clamp(latErr*1.2,-0.2,0.2)+rnd(-0.07,0.07);}
  else{depth=clamp(err*0.055,-1.5,1.5);if(Math.abs(depth)<0.5)depth=0.55*Math.sign(err||1);lat=clamp(latErr*2,-0.9,0.9)+rnd(-0.2,0.2);}
  let T;
  if(outcome==="bank")T=V3(clamp(lat*4,-0.55,0.55)+rnd(-0.08,0.08),3.45+rnd(0,0.25),-8.42);
  else T=HOOP.clone().addScaledVector(dirH,depth).addScaledVector(perp,lat);
  const tf=0.78+dist*0.062;
  const v0=V3((T.x-p0.x)/tf,(T.y-p0.y)/tf+4.9*tf,(T.z-p0.z)/tf);
  const mesh=new THREE.Mesh(ballGeo,shotMat(shot));
  mesh.position.copy(p0);scene.add(mesh);
  const blob=new THREE.Mesh(blobGeo,blobMat.clone());
  blob.rotation.x=-Math.PI/2;blob.position.set(p0.x,0.02,p0.z);scene.add(blob);
  const hot=G.streak>=3;
  const B={mesh,blob,p0:p0.clone(),v0,tf,t:0,phase:"fly",outcome,vel:new THREE.Vector3(),
    val:shot.val,money:shot.money,deep:isDeep,super:!!shot.super,made:false,life:3,bounces:0,
    rec:[],timeLeft:G.timer,hot,startPos:p0.clone(),shooterPos:P.pos.clone(),shooterFace:P.face};
  balls.push(B);
  G.lastErr=err;
  // stats
  if(!G.practice&&!isBattle){
    if(isDeep)G.stats.deepT++;
    if(shot.money)G.stats.moneyT++;
  }
  if(isBattle){
    if(shot.super)G.stats.deepT++;
    battleUseSpot(shot.spotIdx);
    G.shotIdx++;G.canShoot=false;
    setTimeout(()=>{
      if(G.state!=="battle"||G.battleOver)return;
      if(!battleAutoMoveIfNeeded())readyBall();
    },260);
    return;
  }
  // hero moment: last ball / buzzer beater / tiebreak
  const isLast=G.shotIdx===G.seq.length-1;
  if(!G.practice&&(isLast||G.state==="tiebreak"||(G.state==="round"&&G.timer<=3)))startHero(B);
  // advance
  G.shotIdx++;G.canShoot=false;
  const nxt=curShot();
  if(nxt){
    const samePos=isSameShotSpot(nxt,shot);
    setTimeout(()=>{
      if(G.state!=="round"&&G.state!=="tiebreak")return;
      if(samePos){readyBall();}
      else{walkTo(nxt,()=>readyBall());}
    },samePos?260:200);
  }
}
function readyBall(){
  if(G.buzzed)return;
  if(G.mode==="battle"&&G.battleOver)return;
  if(!curShot())return;
  if(G.mode==="battle"&&!battleSpotAvailable(G.battleSpot)){
    if(battleAutoMoveIfNeeded())return;
  }
  handBall.visible=false;pBall.visible=false;
  updDotsUI();
  startPass();
}
function madeBall(b){
  b.made=true;
  if(G.practice){
    netPulse=1;sSwish();cheerSound(false);G.cheer=Math.min(1,G.cheer+0.4);
    if(navigator.vibrate)navigator.vibrate(18);
    popScore("✔ 命中","#7CFC6B");toast(CHEERS[(Math.random()*CHEERS.length)|0]);
    return;
  }
  if(G.mode==="battle"){
    if(G.state!=="battle"||G.battleOver)return;
    const _pm=G.score,_po=G.battleOppScore;
    G.score+=b.val;G.streak++;G.missRun=0;
    G.stats.best=Math.max(G.stats.best,G.streak);
    if(b.super)G.stats.deepM++;
    $("scoreNum").textContent=Math.min(G.score,BATTLE_TARGET);
    netPulse=1;sSwish();
    const big=b.super||G.streak>=5;
    if(big)broadcastSting(b.super?"danger":"score");
    cheerSound(big);G.cheer=Math.min(1,G.cheer+(big?1:0.6));
    if(navigator.vibrate)navigator.vibrate(big?[20,30,20]:18);
    popScore("+"+b.val,b.super?"#ffd23f":"#7CFC6B");
    toast((b.super?"🔥 中场10分! ":"")+CHEERS[(Math.random()*CHEERS.length)|0]+(G.streak>=4?" 🔥x"+G.streak:""),b.super?"#ffd23f":"#7CFC6B");
    if(b.super)djSay("中场超远,十分到手!");
    if(G.streak>=3){$("hudStreak").style.display="block";$("hudStreak").textContent="🔥 x"+G.streak;}
    battleCheckSuperMilestones();
    battleScoreCallout(_pm,_po);
    updBattleUI();updJumbo();
    if(G.score>=BATTLE_TARGET){finishBattle(true,b);return;}
    checkBattleOvertake(_pm,_po);
    return;
  }
  const prev=G.score;
  G.score+=b.val;G.streak++;G.missRun=0;
  G.stats.best=Math.max(G.stats.best,G.streak);
  if(b.money)G.stats.moneyM++;
  if(b.deep)G.stats.deepM++;
  $("scoreNum").textContent=G.score;
  // 反超检测 → 排队特写
  if(G.score>=CUTAWAY_MIN_SCORE){
    G.posted.forEach(p=>{
      if(!p.cut&&prev<=p.score&&G.score>p.score){p.cut=true;G.cutQ.push(p);}
    });
  }
  updTargetUI();
  netPulse=1;sSwish();
  const big=b.deep||b.val>=2||G.streak>=5;
  if(big)broadcastSting(b.deep?"danger":"score");
  cheerSound(big);G.cheer=Math.min(1,G.cheer+(big?1:0.6));
  if(navigator.vibrate)navigator.vibrate(big?[20,30,20]:18);
  popScore("+"+b.val,b.deep?"#54e05a":(b.money?"#ffd23f":"#7CFC6B"));
  toast((b.deep?"⚡ 深远三分! ":"")+CHEERS[(Math.random()*CHEERS.length)|0]+(G.streak>=4?" 🔥x"+G.streak:""));
  if(b.deep)djSay("深远三分!");
  if(G.streak===5){airhorn();djSay("手感火热,挡不住了!");}
  if(G.streak>=3){$("hudStreak").style.display="block";$("hudStreak").textContent="🔥 x"+G.streak;}
  updJumbo();
}

function updBalls(dt){
  for(let i=balls.length-1;i>=0;i--){
    const b=balls[i];b.t+=dt;
    if(b.phase==="fly"){
      const t=Math.min(b.t,b.tf);
      b.mesh.position.set(b.p0.x+b.v0.x*t,b.p0.y+b.v0.y*t-4.9*t*t,b.p0.z+b.v0.z*t);
      b.mesh.rotation.x-=dt*9;b.mesh.rotation.z+=dt*2;
      if(b.t>=b.tf){
        const vy=b.v0.y-9.8*b.tf;
        if(b.outcome==="swish"){
          if(b.opp){
            oppScore(b);b.made=true;
          }else if(b.silent){
            netPulse=1;sSwish();applause(0.3,1.2);if(Math.random()<0.22)boo(1.2);G.cheer=Math.min(1,G.cheer+0.4);
            show.score+=b.val;$("showScore").textContent=show.score;
            popScore("+"+b.val,b.deep?"#54e05a":(b.money?"#ffd23f":"#7CFC6B"));
            b.made=true;
          }else madeBall(b);
          b.phase="fall";
          b.vel.set(b.v0.x*0.12,vy,b.v0.z*0.12);
          b.mesh.position.set(HOOP.x+rnd(-.04,.04),HOOP.y-0.05,HOOP.z+rnd(-.04,.04));
        }else if(b.outcome==="bank"){
          sBoard();b.phase="bankdrop";b.bt=0;
          b.bFrom=b.mesh.position.clone();
        }else if(b.outcome==="rattle"||b.outcome==="rattleout"){
          sClank();b.phase="rattle";b.rt=0;b.rin=b.outcome==="rattle";
          b.ra=Math.atan2(b.mesh.position.z-HOOP.z,b.mesh.position.x-HOOP.x);
          b.rdir=Math.random()<.5?1:-1;
        }else if(b.outcome==="rimout"){
          sClank();if(!b.silent)missBall();b.phase="free";
          const d=V3(b.mesh.position.x-HOOP.x,0,b.mesh.position.z-HOOP.z).normalize();
          b.vel.set(d.x*rnd(1.2,2.2)+rnd(-.6,.6),rnd(2.4,3.6),d.z*rnd(1.2,2.2)+rnd(-.6,.6));
        }else{
          if(!b.silent)missBall();b.phase="free";
          b.vel.set(b.v0.x,vy,b.v0.z);
        }
      }
    }else if(b.phase==="rattle"){
      b.rt+=dt;const k=Math.min(1,b.rt/0.55);
      const sink=b.rin?0.45*k*k:0.18*k;
      const ang=b.ra+b.rt*9*b.rdir,rad=b.rin?0.2*(1-k):0.2;
      b.mesh.position.set(HOOP.x+Math.cos(ang)*rad,HOOP.y+0.08-sink,HOOP.z+Math.sin(ang)*rad);
      b.mesh.rotation.y+=dt*8;
      if(k>=1){
        if(b.rin){madeBall(b);b.phase="fall";b.vel.set(0,-1.6,0);}
        else{
          sClank();missBall();toast("😱 涮筐而出!","#ff8d7a");b.phase="free";
          const d=V3(Math.cos(b.ra+b.rt*9*b.rdir),0,Math.sin(b.ra+b.rt*9*b.rdir)).normalize();
          b.vel.set(d.x*rnd(1.4,2.4),rnd(2.0,3.0),d.z*rnd(1.4,2.4));
        }
      }
    }else if(b.phase==="bankdrop"){
      b.bt+=dt;const k=Math.min(1,b.bt/0.38);
      b.mesh.position.set(
        b.bFrom.x+(HOOP.x-b.bFrom.x)*k,
        b.bFrom.y+(HOOP.y-0.05-b.bFrom.y)*(k*k),
        b.bFrom.z+(HOOP.z-b.bFrom.z)*k);
      b.mesh.rotation.x+=dt*6;
      if(k>=1){madeBall(b);toast("🔨 打板入网!","#ffd23f");b.phase="fall";b.vel.set(0,-1.8,0);}
    }else{ // fall / free
      b.vel.y-=9.8*dt;
      b.mesh.position.addScaledVector(b.vel,dt);
      b.mesh.rotation.x-=b.vel.z*dt*3;b.mesh.rotation.z+=b.vel.x*dt*3;
      const p=b.mesh.position;
      // backboard
      if(b.phase==="free"&&b.vel.z<0&&p.z<-8.5&&p.z>-8.78&&Math.abs(p.x)<0.98&&p.y>2.9&&p.y<4.1){
        p.z=-8.5;b.vel.z*=-0.45;sBoard();
      }
      // floor
      if(p.y<0.16&&b.vel.y<0){
        p.y=0.16;b.vel.y*=-0.42;b.vel.x*=0.72;b.vel.z*=0.72;b.bounces++;
        if(Math.abs(b.vel.y)>0.6)sBounce();
      }
      b.life-=dt;
      if(b.life<=0||(b.bounces>3&&Math.abs(b.vel.y)<0.4)){
        scene.remove(b.mesh);scene.remove(b.blob);
        if(!b.silent)G.shots.push(b);
        balls.splice(i,1);continue;
      }
    }
    if(b.hot&&b.phase==="fly")emitFire(b.mesh.position);
    b.blob.position.set(b.mesh.position.x,0.02,b.mesh.position.z);
    const s=clamp(1.4-b.mesh.position.y*0.12,0.3,1.4);
    b.blob.scale.set(s,s,1);
    if(b.rec.length<240)b.rec.push([b.t,b.mesh.position.x,b.mesh.position.y,b.mesh.position.z]);
  }
}

function pickHighlights(){
  const made=G.shots.filter(s=>s.made&&s.rec.length>6);
  made.forEach(s=>{
    s.hScore=(s.deep?5:0)+(s.timeLeft<3?4:0)+(s.money?3:1)+(s.hot?1:0);
  });
  made.sort((a,b)=>b.hScore-a.hScore);
  G.highlights=made.slice(0,3);
  return G.highlights;
}

/* ---------------- replay system ---------------- */
const REPLAY_PHOTO_DUR=0.32;
const rep={on:false,idx:0,t:0,clip:null,ghost:null,gBlob:null,scoredFx:false};
function startReplay(){
  hidePanel();rep.on=true;rep.idx=0;G.state="replay";
  // 回放先给一个投篮出手合影,所以无论比赛视角如何都显示角色。
  player.g.visible=true;
  passer.g.visible=true;
  $("lbT").style.height="11vh";$("lbB").style.height="11vh";
  $("repUI").style.display="block";
  if(!rep.ghost){
    rep.ghost=new THREE.Mesh(ballGeo,matBall);scene.add(rep.ghost);
    rep.gBlob=new THREE.Mesh(blobGeo,blobMat.clone());rep.gBlob.rotation.x=-Math.PI/2;scene.add(rep.gBlob);
  }
  startClip();
}
function startClip(){
  const h=G.highlights[rep.idx];
  rep.clip=h;rep.t=0;rep.scoredFx=false;
  rep.ghost.visible=true;rep.gBlob.visible=true;
  rep.ghost.material=h.deep?matDeep:(h.money?matGold:matBall);
  rep.end=Math.min(h.rec[h.rec.length-1][0],h.tf+0.4);
  // random broadcast cameras — all positioned in front of the backboard (z > -8) so nothing blocks the view
  const s=h.shooterPos||V3(h.startPos.x,0,h.startPos.z);
  const release=h.p0||h.startPos;
  const dir=HOOP.clone().sub(s);dir.y=0;dir.normalize();
  const perp=V3(dir.z,0,-dir.x);
  const mid=s.clone().lerp(HOOP,0.45);
  const side=Math.random()<0.5?1:-1;
  const photoPos=s.clone().addScaledVector(dir,-2.55).addScaledVector(perp,side*1.65).setY(1.85);
  const photoLook=s.clone().addScaledVector(dir,0.22).setY(1.42).lerp(release.clone(),0.52);
  rep.photoCam={p:photoPos,look:photoLook,n:"出手合影"};
  let p1=mid.clone().addScaledVector(perp,7.5).setY(2.6);
  if(Math.abs(p1.x)>13)p1=mid.clone().addScaledVector(perp,-7.5).setY(2.6);
  const A=[
    {p:p1,n:"侧翼跟拍"},
    {p:s.clone().addScaledVector(dir,-3.2).add(V3(side*1.6,0,0)).setY(3.4),n:"高位跟拍"},
    {p:mid.clone().addScaledVector(perp,4.5*Math.sign(p1.x-mid.x||1)).setY(0.7),n:"地板低机位"}];
  const B=[
    {p:V3(HOOP.x+side*2.1,3.7,HOOP.z+2.7),n:"篮筐特写"},
    {p:V3(side*6.3,2.1,-7.0),n:"底线机位"},
    {p:V3(HOOP.x-side*1.6,4.6,HOOP.z+3.4),n:"高空吊臂"}];
  rep.camA=A[(Math.random()*A.length)|0];
  rep.camB=B[(Math.random()*B.length)|0];
  toast(h.deep?"⚡ 深远三分回放":(h.timeLeft<3?"⏱ 压哨球回放":"💰 关键球回放"),"#ffd23f");
}
function updReplay(dt){
  const h=rep.clip;if(!h)return;
  rep.t+=dt*0.42; // slow-mo
  const photo=rep.t<REPLAY_PHOTO_DUR;
  const t=Math.min(Math.max(0,rep.t-REPLAY_PHOTO_DUR),rep.end);
  // 同步角色姿势:按回放时间映射投篮相位
  if(player.g.visible){
    const ph=photo?0.98:Math.min(1.08,0.92+t/Math.max(0.01,h.tf)*0.18);
    const c=shotCurves(ph);
    const y=poseGuy(player,c,0)+Math.max(0,c.jmp*0.55-c.over*0.55);
    const s=h.shooterPos||V3(h.startPos.x,0,h.startPos.z);
    player.g.position.set(s.x,y,s.z);
    player.g.rotation.y=h.shooterFace!=null?h.shooterFace:faceTo(s,HOOP);
    passer.g.visible=false; // 回放期间隐藏传球者避免挡镜头
  }
  // interp position
  let j=1;while(j<h.rec.length&&h.rec[j][0]<t)j++;
  const a=h.rec[Math.max(0,j-1)],b2=h.rec[Math.min(j,h.rec.length-1)];
  const k=b2[0]>a[0]?(t-a[0])/(b2[0]-a[0]):0;
  if(h.p0&&(photo||t<=h.rec[0][0]))rep.ghost.position.copy(h.p0);
  else rep.ghost.position.set(a[1]+(b2[1]-a[1])*k,a[2]+(b2[2]-a[2])*k,a[3]+(b2[3]-a[3])*k);
  rep.ghost.rotation.x-=dt*4;
  rep.gBlob.position.set(rep.ghost.position.x,0.02,rep.ghost.position.z);
  const cut=h.tf*0.6;
  if(photo){
    rig.pos.copy(rep.photoCam.p);rig.pos.y+=Math.sin(rep.t*8)*0.03;
    rig.look.copy(rep.photoCam.look);
    $("repCam").textContent="📺 机位 0 · "+rep.photoCam.n;
  }else if(t<cut){
    rig.pos.copy(rep.camA.p);rig.pos.x+=Math.sin(rep.t*0.5)*0.5;rig.pos.y+=Math.sin(rep.t*0.7)*0.15;
    $("repCam").textContent="📺 机位 1 · "+rep.camA.n;
  }else{
    rig.pos.copy(rep.camB.p);rig.pos.y+=Math.sin(rep.t*0.6)*0.12;
    $("repCam").textContent="📺 机位 2 · "+rep.camB.n;
  }
  if(!photo)rig.look.copy(rep.ghost.position);
  if(!rep.scoredFx&&t>=h.tf*0.98){
    rep.scoredFx=true;netPulse=1;sSwish();cheerSound(true);G.cheer=1;
  }
  if(rep.t>REPLAY_PHOTO_DUR+rep.end+0.35){
    rep.idx++;
    if(rep.idx<G.highlights.length)startClip();
    else finishReplay();
  }
}
function finishReplay(){
  rep.on=false;
  if(rep.ghost){rep.ghost.visible=false;rep.gBlob.visible=false;}
  player.g.visible=false;passer.g.visible=false; // applyCamMode 重置
  $("lbT").style.height="0";$("lbB").style.height="0";
  $("repUI").style.display="none";
  afterRound();
}
function skipReplay(){if(rep.on)finishReplay();}

/* ---------------- AI sim & bracket ---------------- */
function aiProb(r){return clamp(0.36+(r-85)*0.02+DIFFS[G.diff].ai,0.2,0.78);}
function battleRefreshSpot(i){
  if(G.mode!=="battle"||!G.battleStock||!G.battleReadyAt)return;
  if(i>=0&&i<5&&G.battleStock[i]<=0&&G.tNow>=G.battleReadyAt[i]){
    G.battleStock[i]=BATTLE_NORMAL_STOCK;
    G.battleReadyAt[i]=0;
  }
}
function battleRefreshAll(){
  for(let i=0;i<BATTLE_SPOTS.length;i++)battleRefreshSpot(i);
}
function battleSpotStatus(i){
  battleRefreshSpot(i);
  const sp=BATTLE_SPOTS[i];
  if(sp.super){
    return {ok:(G.superStock||0)>0,label:(G.superStock||0)>0?"可投1次":"待10分节点",short:(G.superStock||0)>0?"1":"--"};
  }
  if(i<5){
    const left=G.battleStock?G.battleStock[i]:BATTLE_NORMAL_STOCK;
    const wait=Math.max(0,((G.battleReadyAt&&G.battleReadyAt[i])||0)-G.tNow);
    return {ok:left>0,label:left>0?left+"/"+BATTLE_NORMAL_STOCK:Math.ceil(wait)+"秒恢复",short:left>0?String(left):Math.ceil(wait)+"s"};
  }
  const wait=Math.max(0,((G.battleReadyAt&&G.battleReadyAt[i])||0)-G.tNow);
  return {ok:wait<=0,label:wait<=0?"可投1次":Math.ceil(wait)+"秒恢复",short:wait<=0?"1":Math.ceil(wait)+"s"};
}

function mirrorSpot(p){

function oppPickSpot(){

  })).filter(c=>c.i!==cur&&oppSpotReady(c.i)&&(c.i!==7||(G.superStock||0)>0));

function updOppShooter(dt){
  if(!OPP.on||G.battleOver)return;
  const g=OPP.guy;OPP.t+=dt;
  if(OPP.phase==="walk"){
    const dur=clamp(OPP.from.distanceTo(OPP.to)/3.4,0.35,1.6);
    const k=Math.min(1,OPP.t/dur);
    OPP.pos.lerpVectors(OPP.from,OPP.to,k);
    g.g.position.copy(OPP.pos);
    g.g.rotation.y=faceTo(OPP.pos,HOOP);
    const sw=Math.sin(OPP.t*15);
    g.legs[0].rotation.x=sw*0.55;g.legs[1].rotation.x=-sw*0.55;
    g.knees[0].rotation.x=Math.max(0,-sw*0.4+0.2);g.knees[1].rotation.x=Math.max(0,sw*0.4+0.2);
    g.ankles[0].rotation.x=-sw*0.2;g.ankles[1].rotation.x=sw*0.2;
    if(k>=1){
      g.legs.forEach(l=>l.rotation.x=0);g.knees.forEach(kn=>kn.rotation.x=0);g.ankles.forEach(a=>a.rotation.x=0);
      oppBeginLoad();
    }
  }else if(OPP.phase==="load"){

      OPP.fired=false;

      g.g.rotation.x=0;
      oppMarkSpotUse();
      OPP.phase="cool";OPP.t=0;
      const baseCool=clamp(0.5-(OPP.o.r-85)*0.01,0.25,0.55)+rnd(0,0.2);
      OPP.coolDur=OPP.forceMove?Math.max(0.2,baseCool*0.55):baseCool;
    }
  }else if(OPP.phase==="cool"){
    if(OPP.t>=OPP.coolDur){
      if(!OPP.forceMove&&oppSpotReady(OPP.spotIdx)&&OPP.spotShots<oppSpotQuota(OPP.spotIdx))oppBeginLoad();

/* ---- 空中球碰撞:撞击改变结果(原本进的被撞歪→不进) ---- */
function checkBallCollisions(){
  for(let i=0;i<balls.length;i++){
    const a=balls[i];if(a.phase!=="fly")continue;
    for(let j=i+1;j<balls.length;j++){
      const b=balls[j];if(b.phase!=="fly")continue;
      if(a.collided&&b.collided)continue;
      // 只有玩家球 vs 对手球之间才判定(同一人的球不互撞)
      if(!!a.opp===!!b.opp)continue;
      const dx=a.mesh.position.x-b.mesh.position.x;
      const dy=a.mesh.position.y-b.mesh.position.y;
      const dz=a.mesh.position.z-b.mesh.position.z;
      const d2=dx*dx+dy*dy+dz*dz;
      if(d2<0.34*0.34){ // 球半径~0.17,两球接触
        ballCollide(a,b);
      }
    }
  }
}
function ballCollide(a,b){
  a.collided=b.collided=true;
  // 互相弹开:沿连线方向给一个横向偏移速度
  const n=V3(a.mesh.position.x-b.mesh.position.x,a.mesh.position.y-b.mesh.position.y,a.mesh.position.z-b.mesh.position.z);
  if(n.length()<0.001)n.set(rnd(-1,1),0.4,rnd(-1,1));
  n.normalize();
  // 原本要进的球被撞 → 改判不进(转 free 落体飞出)
  [[a,1],[b,-1]].forEach(([ball,sgn])=>{
    const wasSwish=ball.outcome==="swish";
    sClank();
    ball.phase="free";
    const vy=ball.v0.y-9.8*ball.t;
    ball.vel.set(ball.v0.x+sgn*n.x*2.6,Math.max(vy,1.2)+1.0,ball.v0.z+sgn*n.z*2.6);
    ball.outcome="rimout";
    ball.life=1.4;
    if(wasSwish){
      if(ball.opp){toast("💥 空中相撞!对手没进!","#7CFC6B");}
      else{toast("💥 空中相撞!你的球被打飞!","#ff8d7a");if(!ball.silent)missBall();}
    }
  });
  // 撞击反馈
  cheerSound(false);if(navigator.vibrate)navigator.vibrate([15,30,15]);
  popScore("💥","#fff");
}

/* ---------------- 英雄时刻:制胜球电影化慢动作 ---------------- */
/* 阶段(墙钟秒): 0出手特写 → 1飞行轨迹 → 2全场沸腾(观众视角) → 3败方惊讶 → 结算 */
const WC_T0=1.3, WC_T1=4.0, WC_T2=5.5, WC_T3=7.4;
const winCine={on:false,win:true,t:0,gold:false,rec:null,recEnd:0,p0:null,
  shooter:null,loser:null,sPos:null,sFace:null,lPos:null,lFace:null,

function poseShock(o,k){
  poseGuy(o,shotCurves(0),0);
  const up=-2.45*k;
  o.arms[0].rotation.x=up;o.arms[1].rotation.x=up;
  o.arms[0].rotation.z=0.45*k;o.arms[1].rotation.z=-0.45*k;
  if(o.elbows){o.elbows[0].rotation.x=-1.25*k;o.elbows[1].rotation.x=-1.25*k;}
  o.g.rotation.x=-0.16*k; // 后仰
  o.legs[0].rotation.x=0.22*k;o.legs[1].rotation.x=0.22*k;
  if(o.knees){o.knees[0].rotation.x=0.42*k;o.knees[1].rotation.x=0.42*k;}
}
function startWinCine(win,ball){

  if(curSpotRing)curSpotRing.visible=false;
  handBall.visible=false;pBall.visible=false;
  // 把还在场的真实球藏掉,改用回放幽灵球
  balls.forEach(bb=>{bb.mesh.visible=false;bb.blob.visible=false;bb.silent=true;bb.life=Math.min(bb.life,0.02);});
  // 投篮者 / 失败者
  if(win){
    w.shooter=player; w.loser=OPP.guy;
    w.sPos=P.pos.clone(); w.sFace=P.face;
  }else{
    w.shooter=OPP.guy; w.loser=player;
    w.sPos=(OPP.pos||OPP.guy.g.position).clone(); w.sFace=faceTo(w.sPos,HOOP);
  }
  w.lPos=(win?(OPP.pos||OPP.guy.g.position):P.pos).clone();
  w.lFace=faceTo(w.lPos,HOOP);
  if(OPP.guy)OPP.guy.active=true;
  // 制胜球轨迹数据
  w.gold=!!(ball&&ball.super);
  if(ball&&ball.rec&&ball.rec.length>2){w.rec=ball.rec;w.recEnd=ball.rec[ball.rec.length-1][0];w.p0=(ball.p0||V3(w.sPos.x,2.05,w.sPos.z)).clone();}
  else{w.rec=null;w.recEnd=0;w.p0=V3(w.sPos.x,2.05,w.sPos.z);}
  if(!w.ghost){
    w.ghost=new THREE.Mesh(ballGeo,matBall);scene.add(w.ghost);
    w.gBlob=new THREE.Mesh(blobGeo,blobMat.clone());w.gBlob.rotation.x=-Math.PI/2;scene.add(w.gBlob);
  }
  w.ghost.material=w.gold?matGold:matBall;
  w.ghost.visible=true;w.gBlob.visible=true;
  w.ghost.position.copy(w.p0);w.gBlob.position.set(w.p0.x,0.02,w.p0.z);
  // 电影感:黑边 + 字幕
  $("lbT").style.height="11vh";$("lbB").style.height="11vh";
  $("heroTag").style.display="block";$("heroTag").textContent="🎬 英雄时刻";
  broadcastSting(win?"score":"danger");
}
const _wcGhost=new THREE.Vector3();
function winCineBallAt(recT){
  const w=winCine;
  if(!w.rec){_wcGhost.copy(w.p0);return _wcGhost;}
  const r=w.rec;let j=1;while(j<r.length&&r[j][0]<recT)j++;
  const a=r[Math.max(0,j-1)],b=r[Math.min(j,r.length-1)];
  const k=b[0]>a[0]?(recT-a[0])/(b[0]-a[0]):0;
  _wcGhost.set(a[1]+(b[1]-a[1])*k,a[2]+(b[2]-a[2])*k,a[3]+(b[3]-a[3])*k);
  return _wcGhost;
}
function updWinCine(dt){
  const w=winCine;if(!w.on)return;
  w.t+=dt;
  const tt=w.t;
  const sdir=HOOP.clone().sub(w.sPos);sdir.y=0;if(sdir.lengthSq()<1e-4)sdir.set(0,0,-1);sdir.normalize();
  const perp=V3(sdir.z,0,-sdir.x);
  const side=w.sPos.x>0?-1:1; // 取靠场内一侧,避免镜头穿到看台外
  // 角色始终可见(此刻 applyCamMode 视为非比赛态会隐藏,故每帧强制)
  hands.visible=false;passer.g.visible=false;
  if(w.shooter)w.shooter.g.visible=true;
  if(w.loser)w.loser.g.visible=true;

  /* ---- 投篮者姿态:出手→跟随动作定格 ---- */
  let ph=tt<WC_T0?(0.82+0.26*(tt/WC_T0)):1.08;
  const sc=shotCurves(ph);
  const sy=poseGuy(w.shooter,sc,0)+Math.max(0,sc.jmp*0.55-sc.over*0.55);
  w.shooter.g.position.set(w.sPos.x,sy,w.sPos.z);
  w.shooter.g.rotation.y=w.sFace;w.shooter.g.rotation.x=0;

  /* ---- 失败者姿态:震惊前保持站立,T2 起慢慢举手后仰 ---- */
  if(tt<WC_T2){
    poseGuy(w.loser,shotCurves(0),0);
    w.loser.g.position.set(w.lPos.x,0,w.lPos.z);
    w.loser.g.rotation.y=w.lFace;w.loser.g.rotation.x=0;
  }else{
    const k=clamp((tt-WC_T2)/0.7,0,1);
    poseShock(w.loser,k);
    w.loser.g.position.set(w.lPos.x,0,w.lPos.z);
    w.loser.g.rotation.y=w.lFace;
  }

  /* ---- 幽灵球轨迹 ---- */
  let ballPos;
  if(tt<WC_T0){
    ballPos=w.rec?winCineBallAt(0):w.p0; w.ghost.visible=true;
  }else if(tt<WC_T1){
    const prog=(tt-WC_T0)/(WC_T1-WC_T0);
    ballPos=winCineBallAt(prog*w.recEnd); w.ghost.visible=true;
    w.ghost.rotation.x-=dt*5;
  }else{
    // 已入网,藏球
    ballPos=HOOP; w.ghost.visible=false;w.gBlob.visible=false;
  }
  if(w.ghost.visible){
    w.ghost.position.copy(ballPos);
    w.gBlob.position.set(ballPos.x,0.02,ballPos.z);
    const bs=clamp(1.4-ballPos.y*0.12,0.3,1.4);w.gBlob.scale.set(bs,bs,1);
  }

  /* ---- 分阶段机位 ---- */
  const hb=Math.sin(tt*7)*0.04; // 轻微手持抖动
  if(tt<WC_T0){
    // 出手特写:站在投篮者与篮筐之间,回看其上半身与出手
    const cp=w.sPos.clone().addScaledVector(sdir,2.5).addScaledVector(perp,side*1.35).setY(2.1);
    rig.pos.set(cp.x,cp.y+hb,cp.z);
    const lk=w.sPos.clone().setY(1.85).lerp(w.p0,0.35);
    rig.look.set(lk.x,lk.y,lk.z);
    $("heroTag").textContent="🎬 出手特写";
  }else if(tt<WC_T1){
    // 飞行轨迹:侧后方跟拍篮球弧线
    const cp=ballPos.clone().addScaledVector(perp,side*3.2).addScaledVector(sdir,-0.6);
    cp.y=clamp(ballPos.y*0.6+1.4,1.6,5.0);
    cp.x=clamp(cp.x,-12.5,12.5);
    rig.pos.set(cp.x,cp.y+hb,cp.z);
    rig.look.copy(ballPos);
    $("heroTag").textContent="🏀 空中轨迹";
  }else if(tt<WC_T2){
    // 全场沸腾·观众视角:从篮筐后方看台俯视,人群在前景
    if(!w.fxCrowd){
      w.fxCrowd=true;netPulse=1;sSwish();G.cheer=1;
      if(w.win){airhorn();cheerSound(true);}else{boo(1.0);}
    }
    const cp=V3(side*4.5,5.6,HOOP.z-4.6);
    rig.pos.set(cp.x+hb,cp.y,cp.z);
    rig.look.set(w.sPos.x*0.4,2.3,(HOOP.z+w.sPos.z)*0.5);
    $("heroTag").textContent=w.win?"🔥 全场沸腾":"🔥 对手率先破百";
  }else{
    // 败方惊讶:贴近失败者的低机位推镜
    const ldir=HOOP.clone().sub(w.lPos);ldir.y=0;if(ldir.lengthSq()<1e-4)ldir.set(0,0,-1);ldir.normalize();
    const lperp=V3(ldir.z,0,-ldir.x);
    const push=clamp((tt-WC_T2-0.0)/2.0,0,1);
    const cp=w.lPos.clone().addScaledVector(ldir,2.9-0.7*push).addScaledVector(lperp,side*1.25).setY(1.95);
    rig.pos.set(cp.x+hb,cp.y,cp.z);
    rig.look.set(w.lPos.x,1.55,w.lPos.z);
    $("heroTag").textContent="😱 难以置信";
  }

  if(tt>=WC_T3){
    w.on=false;
    if(w.ghost){w.ghost.visible=false;w.gBlob.visible=false;}
    $("lbT").style.height="0";$("lbB").style.height="0";$("heroTag").style.display="none";
    showBattleResult(w.win);
  }
}
function simAI(o){
  const p=aiProb(o.r),money=[0,2,4][(Math.random()*3)|0];
  const ev=[];let total=0;
  for(let rk=0;rk<5;rk++){
    let pts=0;
    for(let b=0;b<5;b++){
      const v=(rk===money||b===4)?2:1;
      if(Math.random()<p)pts+=v;
    }
    total+=pts;ev.push({l:"第"+(rk+1)+"架",p:pts,max:rk===money?10:6});
    if(rk===1||rk===2){
      const dp=Math.random()<p*0.82?3:0;total+=dp;
      ev.push({l:"深远球",p:dp,max:3});
    }
  }
  return {ev,total};
}

  c.fillText("霓虹球场已开灯",W/2,762);
  c.font="13px sans-serif";c.fillStyle="#d9f6ff";
  c.fillText("下一场,换你接管最后一投。",W/2,784);
  // 底部 CTA
  c.font="bold 16px sans-serif";c.fillStyle="#dde";
  c.fillText("你能打败库里吗?扫码/点链接挑战同题 →",W/2,850);
  // URL
  c.font="12px monospace";c.fillStyle="#7a8faa";
  try{c.fillText(location.origin+location.pathname+"?seed="+GAME_SEED,W/2,878);}catch(e){}
  // 导出
  cv.toBlob(blob=>{
    if(!blob){toast("生成失败","#ff8d7a");return;}
    // 尝试 Web Share API (手机端可直接分享到微信)
    if(navigator.share&&navigator.canShare){
      const file=new File([blob],"block3pt-"+GAME_SEED+".png",{type:"image/png"});
      if(navigator.canShare({files:[file]})){
        navigator.share({files:[file],title:GAME_NAME+" #"+GAME_SEED,
          text:champ?"🏆 我夺冠了! "+sc+"分":"🏀 "+sc+"分 · 你能超过我吗?"
        }).catch(()=>fallbackSave(blob));
        return;
      }
    }
    fallbackSave(blob);
  },"image/png");
}
function fallbackSave(blob){
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download="block3pt-"+GAME_SEED+".png";
  a.click();setTimeout(()=>URL.revokeObjectURL(url),5000);
  toast("战报已保存 · 发到朋友圈吧!","#7CFC6B");
}

/* ---------------- input ---------------- */
function onDown(e){
  if(e.target&&e.target.id==="camBtn")return;
  if(e.target&&e.target.closest&&e.target.closest("#battleControls"))return;
  if(e.target&&e.target.closest&&e.target.closest("#spotDots"))return;
  if(G.state==="round"||G.state==="tiebreak"||G.state==="battle"){e.preventDefault();startCharge();}
}
function onUp(e){
  if(e.target&&e.target.id==="camBtn")return;
  if(e.target&&e.target.closest&&e.target.closest("#battleControls"))return;
  if(e.target&&e.target.closest&&e.target.closest("#spotDots"))return;
  if(G.state==="round"||G.state==="tiebreak"||G.state==="battle"){doRelease();}
}
addEventListener("pointerdown",onDown,{passive:false});
addEventListener("pointerup",onUp);
addEventListener("keydown",e=>{
  if(e.code==="Space"&&!e.repeat)startCharge();
  if(e.code==="KeyC"&&(G.state==="round"||G.state==="tiebreak"||G.state==="battle"))cycleCam();
  if(G.state==="battle"&&(e.code==="ArrowLeft"||e.code==="KeyA"))battlePrevSpot();
  if(G.state==="battle"&&(e.code==="ArrowRight"||e.code==="KeyD"))battleNextSpot();
});
addEventListener("keyup",e=>{if(e.code==="Space")doRelease();});
addEventListener("contextmenu",e=>e.preventDefault());

/* ---------------- device tilt (手机左右倾斜影响球路) ---------------- */
const TILT={raw:0,base:0,on:false};
function tiltDeg(){return TILT.on?clamp(TILT.raw-TILT.base,-30,30):0;}
addEventListener("deviceorientation",e=>{
  if(e.gamma==null&&e.beta==null)return;
  const a=(screen.orientation&&screen.orientation.angle!=null)?screen.orientation.angle:(window.orientation||0);
  let g;
  if(a===90)g=e.beta;else if(a===-90||a===270)g=e.beta==null?null:-e.beta;else g=e.gamma;
  if(g==null)return;
  TILT.on=true;TILT.raw=g;
  updTiltUI();
});
function calibrateTilt(){TILT.base=TILT.raw;}
function updTiltUI(){
  const w=$("tiltWrap");if(!w)return;
  const show=TILT.on&&(G.state==="round"||G.state==="tiebreak"||G.state==="battle");
  w.style.display=show?"block":"none";
  if(!show)return;
  const d=tiltDeg();
  const dot=$("tiltDot");
  dot.style.left=(50+clamp(d,-25,25)*1.8)+"%";
  dot.style.background=Math.abs(d)<4?"#7CFC6B":(Math.abs(d)<10?"#ffd23f":"#ff5d4d");
}
function askTiltPerm(){
  try{
    if(typeof DeviceOrientationEvent!=="undefined"&&typeof DeviceOrientationEvent.requestPermission==="function")
      DeviceOrientationEvent.requestPermission().catch(()=>{});
  }catch(e){}
}

/* ---------------- main loop ---------------- */
const clock=new THREE.Clock();
let jumboAcc=0,lowBeep=0;
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(0.05,clock.getDelta());
  G.tNow+=dt;
  updTweens(dt);
  const frozen=!!G.cutAway||!!G.battleCut;
  if(!frozen){updBalls(dt);updPose(dt);updPass(dt);updWalk(dt);}
  if(G.state==="aishow")updShow(dt);
  if(G.state==="battle"&&!G.battleCut)updBattle(dt);
  updFire(dt);
  updConf(dt);
  G.cheer=Math.max(0,G.cheer-dt*0.5);
  updCrowd(G.tNow);
  updBackcourtShow(G.tNow);
  if(netPulse>0){netPulse-=dt*3;const s=1+netPulse*0.35;netMesh.scale.set(s,1+netPulse*0.5,s);}
  // 反超特写排队
  if(G.state==="round"&&!frozen)tryCutAway();
  if(G.cutAway)updCutAway(dt);
  if(G.battleCut)updBattleCut(dt);
  // 练习结束检测
  if(G.practice&&G.state==="round"&&G.shotIdx>=G.seq.length&&balls.length===0&&!G.charging&&!passing){
    endPractice();
  }
  // states
  if(G.state==="round"&&G.running&&!G.practice){
    G.timer-=dt;
    if(G.timer<35&&!G.organed){G.organed=true;organCharge();}
    const tl=$("hudTimer");
    tl.textContent=Math.max(0,G.timer).toFixed(1);
    tl.className=G.timer<=10?"low":"";
    if(G.timer<=5&&G.timer>0&&G.tNow-lowBeep>1){lowBeep=G.tNow;sBeep();}
    jumboAcc+=dt;if(jumboAcc>0.5){jumboAcc=0;updJumbo();}
    if(G.timer<=0&&!G.buzzed){
      G.buzzed=true;sBuzz();paSay("时间到!",true);
      if(G.charging)doRelease();
      G.canShoot=false;G.charging=false;handBall.visible=false;
      toast("⏱ 时间到!","#ff8d7a");
    }
    const done=G.buzzed||G.shotIdx>=G.seq.length;
    if(done&&balls.length===0&&!G.charging){endRound();}
  }
  if(G.state==="tiebreak"){
    if(G.shotIdx>=G.seq.length&&balls.length===0&&!G.charging){
      G.state="tiebreak-wait";setTimeout(tiebreakResolve,600);
    }
  }
  if(G.charging){
    G.power=Math.min(100,G.power+DIFFS[G.diff].fill*dt);
    $("pFill").style.height=G.power+"%";
  }
  // cameras
  if(rep.on)updReplay(dt);
  else if(winCine.on)updWinCine(dt);
  else if(hero.on)updHero(dt);
  else if(G.cutAway){/* updCutAway 已控制镜头 */}
  else if(G.battleCut){/* updBattleCut 已控制镜头 */}
  else if(G.state==="aishow")updShowCam();
  else if(["menu","diff","intro","roundend","sim","bracket","champion","runnerup","eliminated","battleend"].includes(G.state)){
    const a=G.tNow*0.1;
    rig.pos.set(Math.cos(a)*13,6.5+Math.sin(G.tNow*0.3)*0.5,Math.sin(a)*11-3);
    rig.look.set(0,2.5,-5);
  }
  else if((G.state==="round"||G.state==="tiebreak"||G.state==="battle")&&!G.glideCam)updPlayCam(dt);
  camera.position.copy(rig.pos);
  camera.lookAt(rig.look);
  renderer.render(scene,camera);
  updSpotDots();
}

/* ---------------- boot ---------------- */
buildCourt();
const seatList=buildStands();
buildBackcourtShow();
buildCrowd(seatList);
buildHoop();
buildAtmos();
buildRacks();
buildHands();
buildCharacters();
buildSpotDots();
applyCamMode();
handBall.visible=false;
showMenu();
animate();
</script>
